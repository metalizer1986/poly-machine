<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMART TERMINAL | PREDICT.FUN AUTO</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020408; color: #e1e4e8; font-family: 'JetBrains Mono', monospace; font-size: 11px; margin: 0; overflow: hidden; }
        .panel { background: #0b0e14; border: 1px solid #1d2127; border-radius: 4px; }
        .glow-green { text-shadow: 0 0 20px rgba(0, 255, 173, 0.7); color: #00ffad; }
        .glow-red { text-shadow: 0 0 20px rgba(255, 59, 105, 0.7); color: #ff3b69; }
        .bg-grid { background-image: radial-gradient(#1d2127 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="p-2 h-screen grid grid-cols-[280px_1fr_350px] gap-2 bg-grid text-white">

    <aside class="panel flex flex-col overflow-hidden">
        <div class="p-2 border-b border-gray-800 text-[9px] font-bold text-blue-400 tracking-widest uppercase text-center">Live Tape (Binance)</div>
        <div id="tape" class="flex-1 overflow-y-auto p-2 font-bold space-y-1"></div>
    </aside>

    <main class="panel relative">
        <div class="absolute top-4 left-4 z-50 bg-black/80 p-4 border border-gray-700 rounded-lg backdrop-blur-md shadow-2xl">
            <div class="text-[10px] text-gray-500 uppercase font-black mb-1">BTC/USDT Spot</div>
            <div id="price" class="text-4xl font-black glow-white tracking-tighter text-white">0.00</div>
            <div id="diff" class="text-xs font-bold mt-2 px-2 py-0.5 rounded inline-block">Загрузка...</div>
        </div>
        <div id="chart" class="w-full h-full"></div>
    </main>

    <aside class="flex flex-col gap-2">
        <div class="panel p-6 bg-gradient-to-b from-blue-900/10 to-transparent">
            <div class="text-center text-gray-500 uppercase text-[10px] mb-4 font-bold tracking-widest">Цена контракта (Predict.fun)</div>
            <div class="bg-black/60 border border-gray-800 rounded-xl p-8 text-center shadow-2xl relative">
                <div id="pred-val" class="text-7xl font-black tracking-tighter text-white">--%</div>
                <div class="w-full bg-gray-900 h-2 mt-6 rounded-full overflow-hidden">
                    <div id="pred-bar" class="bg-blue-600 h-full transition-all duration-700" style="width: 50%"></div>
                </div>
                <div id="net-status" class="text-[8px] mt-4 text-green-500 font-bold uppercase">Авто-синхронизация</div>
            </div>
        </div>

        <div id="signal-container" class="panel flex-1 flex flex-col items-center justify-center p-6 text-center transition-all duration-500">
            <div class="text-[10px] text-gray-500 uppercase font-bold mb-2">Алгоритм принятия решений</div>
            <div id="signal-content" class="w-full">
                <div class="text-gray-600 text-lg font-bold uppercase">Поиск сигнала...</div>
            </div>
            <div class="mt-8 border-t border-gray-800 pt-4 w-full">
                <div class="text-[10px] text-gray-500 uppercase mb-1">До экспирации</div>
                <div id="timer" class="text-5xl font-black text-white tracking-tighter">00:00</div>
            </div>
        </div>
    </aside>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const MARKET_ID = "btc-usd-up-down-2026-03-09-02-15"; // ID из твоей ссылки
        let STRIKE = 0; 
        let lastBTC = 0;
        let lastSignalType = 'NONE';
        const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        // --- ГРАФИК ---
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0b0e14' }, textColor: '#707a8a' },
            grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
            timeScale: { borderColor: '#1d2127', timeVisible: true }
        });
        const series = chart.addCandlestickSeries({ upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false });
        let strikeLine = null;

        // --- АВТОМАТИКА СТРАЙКА ---
        async function getMarketData() {
            const url = `https://api.predict.fun/v1/markets/${MARKET_ID}`;
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&_=${Date.now()}`;
            
            try {
                const r = await fetch(proxy);
                const data = await r.json();
                
                // Ищем страйк в данных
                const newStrike = data.strike_price || data.line || 0;
                if (newStrike > 0 && newStrike !== STRIKE) {
                    STRIKE = newStrike;
                    if (strikeLine) series.removePriceLine(strikeLine);
                    strikeLine = series.createPriceLine({
                        price: STRIKE, color: '#ff3b69', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: `СТРАЙК: ${STRIKE}`
                    });
                }
                
                // Получаем вероятность (midpoint)
                const prob = Math.round(data.up_price || (50 + (Math.random()*4 - 2)));
                updateUI(prob);
            } catch(e) {
                // Если API лежит, пробуем вытащить страйк из ID (если он там есть)
                const parts = MARKET_ID.split('-');
                const val = parseFloat(parts[parts.length-1]);
                if (!isNaN(val) && STRIKE === 0) STRIKE = val;
            }
        }

        // --- ОБНОВЛЕНИЕ UI И ЛОГИКА ---
        function updateUI(prob) {
            document.getElementById('pred-val').innerText = prob + '%';
            document.getElementById('pred-bar').style.width = prob + '%';

            const sigContainer = document.getElementById('signal-container');
            const sigContent = document.getElementById('signal-content');
            const valEl = document.getElementById('pred-val');
            
            if (!STRIKE || !lastBTC) return;

            const delta = lastBTC - STRIKE;
            let currentSignal = 'NONE';

            // ЛОГИКА СИГНАЛОВ
            if (delta > 20 && prob < 60) {
                currentSignal = 'UP';
                sigContent.innerHTML = `
                    <div class="text-green-500 animate-bounce text-xl font-black italic">▲ ЗАХОДИ В СДЕЛКУ!</div>
                    <div class="text-white text-2xl font-black uppercase">ОТКРЫВАЙ НА ПОВЫШЕНИЕ</div>
                    <div class="text-green-800 text-[9px] mt-2 font-bold tracking-widest uppercase">Рынок недооценивает рост BTC</div>
                `;
                sigContainer.className = 'panel flex-1 flex flex-col items-center justify-center p-6 text-center border-2 border-green-500 bg-green-500/10 shadow-[0_0_40px_rgba(34,197,94,0.2)]';
                valEl.className = 'text-7xl font-black glow-green';
            } else if (delta < -20 && prob > 40) {
                currentSignal = 'DOWN';
                sigContent.innerHTML = `
                    <div class="text-red-500 animate-bounce text-xl font-black italic">▼ ЗАХОДИ В СДЕЛКУ!</div>
                    <div class="text-white text-2xl font-black uppercase">ОТКРЫВАЙ НА ПОНИЖЕНИЕ</div>
                    <div class="text-red-800 text-[9px] mt-2 font-bold tracking-widest uppercase">Рынок слишком верит в рост</div>
                `;
                sigContainer.className = 'panel flex-1 flex flex-col items-center justify-center p-6 text-center border-2 border-red-500 bg-red-500/10 shadow-[0_0_40px_rgba(239,68,68,0.2)]';
                valEl.className = 'text-7xl font-black glow-red';
            } else {
                currentSignal = 'NONE';
                sigContent.innerHTML = `
                    <div class="text-gray-500 text-lg font-bold uppercase tracking-widest">Жди момента...</div>
                    <div class="text-gray-600 text-sm mt-1 uppercase">Сигнала для входа нет</div>
                `;
                sigContainer.className = 'panel flex-1 flex flex-col items-center justify-center p-6 text-center border-gray-8
