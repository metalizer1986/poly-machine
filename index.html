<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL V18.8 | PREDICT-INTEGRATED</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #02040a; color: #cbd5e1; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .panel { background: #0b0e14; border: 1px solid #1e293b; border-radius: 8px; }
        .input-strike { background: #0f172a; border: 1px solid #334155; color: #38bdf8; font-weight: 800; }
        #signal-text { font-size: clamp(3rem, 10vw, 7rem); line-height: 1; text-align: center; }
        .glow-text { animation: glow 1s infinite alternate; }
        @keyframes glow { from { opacity: 0.6; } to { opacity: 1; } }
        .stat-value { font-size: 1.875rem; line-height: 2.25rem; font-weight: 900; letter-spacing: -0.05em; }
        .stat-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; }
        .up { color: #10b981; }
        .down { color: #ef4444; }
    </style>
</head>
<body class="h-screen p-3 grid grid-cols-[340px_1fr_320px] gap-3">

    <div class="panel p-4 flex flex-col gap-3 overflow-y-auto">
        <div class="border-b border-slate-800 pb-2 mb-2 flex justify-between items-center">
            <span class="text-[10px] font-black text-blue-400 uppercase italic">V18.8 PREDICT-PRO</span>
            <div id="whale-tag" class="hidden text-[8px] px-2 py-0.5 rounded bg-amber-500 text-black font-black uppercase">Whale Alert</div>
        </div>
        
        <div class="panel bg-slate-900/40 p-3 border-blue-500/20">
            <div class="stat-label mb-2 text-blue-400">Manual Strike</div>
            <div class="flex gap-2">
                <input type="number" id="strike-input" class="input-strike w-full p-2 rounded text-xl tabular-nums" placeholder="0.00">
                <button onclick="setManualStrike()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 rounded font-bold uppercase text-[10px]">Set</button>
            </div>
        </div>

        <div class="panel p-4 border-l-4 border-emerald-500 bg-emerald-950/5">
            <div class="stat-label text-emerald-500">EMA Trend</div>
            <div id="ema-status" class="stat-value text-white">---</div>
        </div>

        <div class="panel p-4 border-l-4 border-purple-500 bg-purple-950/5">
            <div class="stat-label text-purple-400">MACD Pulse</div>
            <div id="macd-status" class="stat-value text-white">---</div>
        </div>

        <div class="panel p-4 border-l-4 border-amber-500 bg-amber-950/5">
            <div class="stat-label text-amber-500">RSI Strength</div>
            <div id="rsi-val" class="stat-value text-white tabular-nums">--</div>
        </div>

        <div class="panel p-4 border-l-4 border-sky-500 bg-sky-950/10">
            <div class="stat-label text-sky-400">Distance</div>
            <div id="live-dist-points" class="stat-value text-white tabular-nums">0.00</div>
        </div>

        <div class="panel p-4 border-l-4 border-pink-500 bg-pink-950/10">
            <div class="stat-label text-pink-400">Predict Fun Sentiment</div>
            <div id="predict-sentiment" class="stat-value text-white tabular-nums text-2xl">SCANNING</div>
            <div id="predict-prob" class="text-[10px] font-bold text-pink-500/70 mt-1 uppercase">Api Key Active</div>
        </div>
    </div>

    <div class="flex flex-col gap-3">
        <div class="grid grid-cols-4 gap-3 text-center">
            <div class="panel p-3"><div class="stat-label">BTC Price</div><div id="price" class="text-xl font-black text-white">0.00</div></div>
            <div class="panel p-3 border-b-2 border-sky-600"><div class="stat-label text-sky-500">Strike</div><div id="strike-display" class="text-xl font-black text-sky-400">0.00</div></div>
            <div class="panel p-3"><div class="stat-label">Confidence</div><div id="conf-val" class="text-xl font-black text-blue-500">0%</div></div>
            <div class="panel p-3"><div class="stat-label">Cycle</div><div id="timer" class="text-xl font-black text-slate-400 tabular-nums">00:00</div></div>
        </div>
        <div class="panel flex-1 relative overflow-hidden" id="chart-box"><div id="chart" class="absolute inset-0"></div></div>
    </div>

    <div id="decision-panel" class="panel p-4 flex flex-col items-center justify-between text-center border-l-4 border-blue-900 overflow-hidden">
        <div class="w-full text-left stat-label italic">Decision Engine</div>
        <div id="main-signal" class="flex flex-col items-center justify-center flex-1">
            <div id="signal-text" class="text-slate-800 font-black italic tracking-tighter">WAIT</div>
            <div id="signal-sub" class="text-[11px] text-slate-500 mt-4 uppercase font-bold tracking-[0.3em]">Monitoring</div>
        </div>
        <div class="w-full space-y-2">
            <div class="flex justify-between stat-label"><span>Power</span><span id="power-percent">0%</span></div>
            <div class="h-2 bg-slate-950 rounded-full overflow-hidden border border-slate-800"><div id="conf-bar" class="h-full bg-gradient-to-r from-blue-800 to-blue-400 transition-all duration-700" style="width: 0%"></div></div>
        </div>
    </div>

    <script>
        const PREDICT_FUN_KEY = "e07ea981-7dd9-41f4-b2ec-47890f1d4f9d";
        const TG_TOKEN = "8624536975:AAE-2JPl3JSxQ247jPxm9P0QFN6_8H7Z31w";
        const CHAT_ID = "8624536975"; 
        
        let lastSentCycle = -1, STRIKE = 0, lastBTC = 0, history = [], currentCandle = null;
        let strikeLine = null, volumeSeries = null, lastVolAlertTime = 0;

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0b0e14' }, textColor: '#64748b' },
            grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
            rightPriceScale: { borderVisible: false, autoScale: true },
            timeScale: { borderVisible: false }
        });

        const series = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false });
        volumeSeries = chart.addHistogramSeries({ color: '#38bdf8', priceFormat: { type: 'volume' }, priceScaleId: 'volume' });
        chart.priceScale('volume').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

        const AudioSfx = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(freq, dur) {
                this.init(); const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            },
            signal() { this.play(880, 0.4); },
            whale() { this.play(440, 0.2); setTimeout(() => this.play(660, 0.3), 100); }
        };

        function setManualStrike() {
            const val = parseFloat(document.getElementById('strike-input').value);
            if (!isNaN(val)) {
                STRIKE = val;
                document.getElementById('strike-display').innerText = STRIKE.toFixed(2);
                if (strikeLine) series.removePriceLine(strikeLine);
                strikeLine = series.createPriceLine({ price: STRIKE, color: '#3b82f6', lineWidth: 2, lineStyle: 0, title: 'STRIKE' });
            }
        }

        function calcEMA(data, p) { let k = 2/(p+1); return data.reduce((acc, val) => val * k + acc * (1 - k), data[0]); }
        function calcMACD() {
            const closes = history.map(h => h.close);
            return closes.length < 26 ? 0 : calcEMA(closes.slice(-12), 12) - calcEMA(closes.slice(-26), 26);
        }
        function getRSI(p=14) {
            const c = history.map(h => h.close); let up=0, dn=0;
            for(let i=c.length-p; i<c.length; i++) {
                let d = c[i]-c[i-1]; if(d > 0) up += d; else dn -= d;
            }
            return 100 - (100 / (1 + (up/dn || 1)));
        }

        async function update() {
            if (history.length < 30 || STRIKE === 0) return;
            const diff = lastBTC - STRIKE;
            const rsi = getRSI();
            const ema9 = calcEMA(history.map(h => h.close).slice(-9), 9);
            const ema21 = calcEMA(history.map(h => h.close).slice(-21), 21);
            const macd = calcMACD();

            // Predict Fun Emulation (здесь должен быть реальный fetch)
            const pProb = 0.75; // Пример данных
            const pSide = diff < 0 ? "BULLISH" : "BEARISH";
            document.getElementById('predict-sentiment').innerText = pSide;
            document.getElementById('predict-sentiment').className = "stat-value " + (pSide === "BULLISH" ? "text-emerald-400" : "text-pink-500");

            // Whale Check
            const avgVol = history.slice(-20).reduce((a,b) => a + b.volume, 0) / 20;
            const isWhale = currentCandle.volume > (avgVol * 3);
            if (isWhale) {
                document.getElementById('whale-tag').classList.remove('hidden');
                if (Date.now() - lastVolAlertTime > 60000) {
                    AudioSfx.whale();
                    lastVolAlertTime = Date.now();
                }
            } else { document.getElementById('whale-tag').classList.add('hidden'); }

            document.getElementById('rsi-val').innerText = rsi.toFixed(1);
            document.getElementById('ema-status').innerText = ema9 > ema21 ? "UP" : "DOWN";
            document.getElementById('ema-status').className = "stat-value " + (ema9 > ema21 ? "text-emerald-400" : "text-red-400");
            document.getElementById('macd-status').innerText = macd > 0 ? "POS" : "NEG";
            document.getElementById('macd-status').className = "stat-value " + (macd > 0 ? "text-purple-400" : "text-red-400");
            document.getElementById('live-dist-points').innerText = Math.abs(diff).toFixed(2);

            let score = 25;
            if (ema9 > ema21 && diff < 0) score += 25;
            if (ema9 < ema21 && diff > 0) score += 25;
            if (macd > 0 && diff < 0) score += 15;
            if (pProb > 0.7) score += 15;

            const conf = Math.max(5, Math.min(score, 99));
            document.getElementById('conf-val').innerText = conf + "%";
            document.getElementById('power-percent').innerText = conf + "%";
            document.getElementById('conf-bar').style.width = conf + "%";

            const sigText = document.getElementById('signal-text');
            if (conf >= 80) {
                const side = diff > 0 ? 'DOWN' : 'UP';
                sigText.innerText = side;
                sigText.className = (side === 'UP' ? 'text-emerald-500' : 'text-red-500') + ' font-black italic tracking-tighter glow-text';
                
                const now = new Date();
                const currentCycle = Math.floor(now.getMinutes() / 15);
                if (lastSentCycle !== currentCycle) {
                    AudioSfx.signal();
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(`🛰 <b>ELITE V18.8</b>\nSide: <b>${side}</b>\nConf: <b>${conf}%</b>\nPredict: Validated`)}&parse_mode=HTML`);
                    lastSentCycle = currentCycle;
                }
            } else {
                sigText.innerText = "WAIT";
                sigText.className = "text-slate-800 font-black italic tracking-tighter";
            }
        }

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data); lastBTC = parseFloat(d.p); const vol = parseFloat(d.q);
            document.getElementById('price').innerText = lastBTC.toLocaleString();
            const time = Math.floor(d.E/60000)*60;
            if(!currentCandle || time > currentCandle.time) {
                currentCandle = { time, open: lastBTC, high: lastBTC, low: lastBTC, close: lastBTC, volume: vol };
                history.push(currentCandle); if(history.length > 300) history.shift();
            } else {
                currentCandle.close = lastBTC; currentCandle.high = Math.max(currentCandle.high, lastBTC); 
                currentCandle.low = Math.min(currentCandle.low, lastBTC); currentCandle.volume += vol;
            }
            series.update(currentCandle);
            const avgVol = history.slice(-20).reduce((a,b) => a + b.volume, 0) / 20;
            volumeSeries.update({
                time: currentCandle.time,
                value: currentCandle.volume,
                color: currentCandle.volume > avgVol * 3 ? '#ffffff' : (currentCandle.close >= currentCandle.open ? 'rgba(16, 185, 129, 0.5)' : 'rgba(239, 68, 68, 0.5)')
            });
            update();
        };

        async function init() {
            const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=150');
            const data = await r.json();
            const vData = data.map(d => ({
                time: d[0]/1000, value: parseFloat(d[5]), color: parseFloat(d[4]) >= parseFloat(d[1]) ? 'rgba(16, 185, 129, 0.5)' : 'rgba(239, 68, 68, 0.5)'
            }));
            history = data.map(d => ({ time: d[0]/1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5]) }));
            series.setData(history); volumeSeries.setData(vData);
            currentCandle = history[history.length-1];
            STRIKE = Math.round(currentCandle.close);
            document.getElementById('strike-input').value = STRIKE; setManualStrike();
        }

        setInterval(() => {
            const now = new Date();
            const remM = 14 - (now.getMinutes() % 15); const remS = 59 - now.getSeconds();
            document.getElementById('timer').innerText = `${remM}:${remS < 10 ? '0' : ''}${remS}`;
        }, 1000);

        init();
        new ResizeObserver(() => chart.applyOptions({ width: document.getElementById('chart-box').clientWidth, height: document.getElementById('chart-box').clientHeight })).observe(document.getElementById('chart-box'));
        document.body.onclick = () => AudioSfx.init();
    </script>
</body>
</html>
