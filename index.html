<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ТЕРМИНАЛ ПРИБЫЛИ | PREDICT.FUN</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020408; color: #e1e4e8; font-family: 'JetBrains Mono', monospace; font-size: 11px; margin: 0; overflow: hidden; }
        .panel { background: #0b0e14; border: 1px solid #1d2127; border-radius: 4px; }
        .glow-green { text-shadow: 0 0 20px rgba(0, 255, 173, 0.7); color: #00ffad; }
        .glow-red { text-shadow: 0 0 20px rgba(255, 59, 105, 0.7); color: #ff3b69; }
        .bg-grid { background-image: radial-gradient(#1d2127 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="p-2 h-screen grid grid-cols-[280px_1fr_350px] gap-2 bg-grid">

    <aside class="panel flex flex-col overflow-hidden border-gray-800">
        <div class="p-2 border-b border-gray-800 text-[9px] font-bold text-blue-400 tracking-widest uppercase">Лента сделок BTC (Live)</div>
        <div id="tape" class="flex-1 overflow-y-auto p-2 font-bold space-y-1"></div>
    </aside>

    <main class="panel relative border-gray-800">
        <div class="absolute top-4 left-4 z-50 bg-black/80 p-4 border border-gray-700 rounded-lg backdrop-blur-md shadow-2xl">
            <div class="text-[10px] text-gray-500 uppercase font-black mb-1">Цена BTC/USDT (Binance)</div>
            <div id="price" class="text-4xl font-black text-white tracking-tighter">0.00</div>
            <div id="diff" class="text-xs font-bold mt-2 px-2 py-0.5 rounded bg-black/50 inline-block">-- до страйка</div>
        </div>
        <div id="chart" class="w-full h-full"></div>
    </main>

    <aside class="flex flex-col gap-2">
        <div class="panel p-6 bg-gradient-to-b from-blue-900/10 to-transparent border-blue-900/30">
            <div class="text-center text-gray-500 uppercase text-[10px] mb-4 font-bold tracking-widest">Вероятность UP (Сайт)</div>
            <div class="bg-black/60 border border-gray-800 rounded-xl p-8 text-center shadow-2xl relative overflow-hidden">
                <div id="pred-val" class="text-7xl font-black text-white tracking-tighter">--%</div>
                <div class="w-full bg-gray-900 h-2 mt-6 rounded-full overflow-hidden">
                    <div id="pred-bar" class="bg-blue-600 h-full transition-all duration-700" style="width: 50%"></div>
                </div>
                <div id="net-status" class="text-[8px] mt-4 text-green-500 font-bold animate-pulse">● СОЕДИНЕНИЕ АКТИВНО</div>
            </div>
        </div>

        <div id="signal-container" class="panel flex-1 flex flex-col items-center justify-center p-6 text-center relative transition-all duration-500">
            <div class="text-[10px] text-gray-500 uppercase font-bold mb-2">Статус алгоритма</div>
            
            <div id="signal-content" class="w-full flex flex-col items-center">
                <div class="text-gray-600 text-lg font-bold uppercase">Анализ рынка...</div>
            </div>

            <div class="mt-8 border-t border-gray-800 pt-4 w-full">
                <div class="text-[10px] text-gray-500 uppercase mb-1">До закрытия раунда</div>
                <div id="timer" class="text-5xl font-black text-white tracking-tighter">15:00</div>
            </div>
        </div>
    </aside>

    <script>
        // --- НАСТРОЙКИ ---
        const STRIKE = 67600; // МЕНЯЙ ЭТО ЧИСЛО КАЖДЫЙ РАУНД
        let lastBTC = 0;
        let lastSignalType = 'NONE';
        const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        // --- ГРАФИК ---
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0b0e14' }, textColor: '#707a8a' },
            grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
            timeScale: { borderColor: '#1d2127', timeVisible: true }
        });
        const series = chart.addCandlestickSeries({ 
            upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false, 
            wickUpColor: '#00ffad', wickDownColor: '#ff3b69' 
        });
        
        series.createPriceLine({ 
            price: STRIKE, color: '#ff3b69', lineWidth: 2, lineStyle: 2, 
            axisLabelVisible: true, title: `СТРАЙК ${STRIKE}` 
        });

        // Загрузка истории
        fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100`)
            .then(r => r.json()).then(data => {
                series.setData(data.map(d => ({
                    time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
                })));
                chart.timeScale().fitContent();
            });

        // --- BINANCE ЦЕНА ---
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data);
            lastBTC = parseFloat(d.p);
            document.getElementById('price').innerText = lastBTC.toLocaleString();
            
            const delta = lastBTC - STRIKE;
            const diffEl = document.getElementById('diff');
            diffEl.innerText = `${delta > 0 ? '▲ +' : '▼ '}${delta.toFixed(2)} от страйка`;
            diffEl.className = `text-xs font-bold mt-2 px-2 py-0.5 rounded ${delta > 0 ? 'bg-green-900/30 text-green-400' : 'bg-red-900/30 text-red-400'}`;

            series.update({ time: Math.floor(d.E / 60000) * 60, close: lastBTC });

            const tape = document.getElementById('tape');
            tape.insertAdjacentHTML('afterbegin', `
                <div class="flex justify-between py-1 border-b border-gray-900/30 ${delta > 0 ? 'text-green-500' : 'text-red-500'}">
                    <span>${new Date().toLocaleTimeString()}</span>
                    <span>${lastBTC.toFixed(1)}</span>
                </div>
            `);
            if(tape.children.length > 30) tape.lastChild.remove();
        };

        // --- ЛОГИКА СИГНАЛОВ (РУССКИЙ ЯЗЫК) ---
        function updateLogic() {
            if (lastBTC === 0) return;

            // Имитация/Получение вероятности с сайта (в реальности тут будет fetch)
            const prob = lastBTC > STRIKE ? 52 + Math.random()*8 : 48 - Math.random()*8;
            const displayProb = Math.round(prob);
            
            document.getElementById('pred-val').innerText = displayProb + '%';
            document.getElementById('pred-bar').style.width = displayProb + '%';

            const sigContainer = document.getElementById('signal-container');
            const sigContent = document.getElementById('signal-content');
            const valEl = document.getElementById('pred-val');

            let currentSignal = 'NONE';

            // УСЛОВИЕ НА ПОВЫШЕНИЕ (UP)
            if (lastBTC > STRIKE + 15 && displayProb < 65) {
                currentSignal = 'UP';
                sigContent.innerHTML = `
                    <div class="text-green-500 animate-bounce text-xl font-black mb-2">▲ ЗАХОДИ В СДЕЛКУ</div>
                    <div class="text-white text-2xl font-black uppercase tracking-tighter">ОТКРЫВАЙ НА ПОВЫШЕНИЕ</div>
                    <div class="text-green-700 text-[10px] mt-3 font-bold uppercase">Цена на сайте слишком низкая!</div>
                `;
                sigContainer.className = 'panel flex-1 flex flex-col items-center justify-center p-6 text-center border-2 border-green-500 bg-green-500/10 shadow-[0_0_30px_rgba(34,197,94,0.2)]';
                valEl.className = 'text-7xl font-black glow-green';
            } 
            // УСЛОВИЕ НА ПОНИЖЕНИЕ (DOWN)
            else if (lastBTC < STRIKE - 15 && displayProb > 40) {
                currentSignal = 'DOWN';
                sigContent.innerHTML = `
                    <div class="text-red-500 animate-bounce text-xl font-black mb-2">▼ ЗАХОДИ В СДЕЛКУ</div>
                    <div class="text-white text-2xl font-black uppercase tracking-tighter">ОТКРЫВАЙ НА ПОНИЖЕНИЕ</div>
                    <div class="text-red-700 text-[10px] mt-3 font-bold uppercase">Цена на сайте слишком высокая!</div>
                `;
                sigContainer.className = 'panel flex-1 flex flex-col items-center justify-center p-6 text-center border-2 border-red-500 bg-red-500/10 shadow-[0_0_30px_rgba(239,68,68,0.2)]';
                valEl.className = 'text-7xl font-black glow-red';
            } 
            // НЕТ СИГНАЛА
            else {
                currentSignal = 'NONE';
                sigContent.innerHTML = `
                    <div class="text-gray-500 text-lg font-bold uppercase tracking-widest">Жди момента...</div>
                    <div class="text-gray-600 text-sm mt-2">Рынок сбалансирован, входа нет</div>
                `;
                sigContainer.className = 'panel flex-1 flex flex-col items-center justify-center p-6 text-center border-gray-800 bg-transparent';
                valEl.className = 'text-7xl font-black text-white';
            }

            // Звуковой алерт при смене сигнала
            if (currentSignal !== 'NONE' && currentSignal !== lastSignalType) {
                alertSound.play().catch(() => {});
            }
            lastSignalType = currentSignal;
        }

        setInterval(updateLogic, 3000);

        // --- ТАЙМЕР ---
        let seconds = 840; 
        setInterval(() => {
            seconds--; if(seconds < 0) seconds = 900;
            const m = Math.floor(seconds/60); const s = seconds%60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);

    </script>
</body>
</html>
