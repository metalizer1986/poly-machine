<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL ALPHA V10 | AUDIO RADAR</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { background: #030305; color: #ececec; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .panel { background: #0a0a0d; border: 1px solid #1a1b1f; border-radius: 16px; }
        .alert-active { animation: alert-pulse 1s infinite; border-color: #3b82f6 !important; }
        @keyframes alert-pulse { 0% { box-shadow: 0 0 0px rgba(59, 130, 246, 0); } 50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); } 100% { box-shadow: 0 0 0px rgba(59, 130, 246, 0); } }
        .update-flash { animation: flash 0.4s ease-out; }
        @keyframes flash { 0% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="h-screen p-3 grid grid-cols-[280px_1fr_360px] gap-3">

    <div class="panel p-4 flex flex-col overflow-hidden">
        <div class="flex justify-between items-center mb-4 border-b border-gray-900 pb-2">
            <span class="text-[10px] text-blue-500 font-black uppercase tracking-widest">Live Radar</span>
            <span id="sync-timer" class="text-[9px] text-gray-600">Sync: 60s</span>
        </div>
        <div id="tape" class="flex-1 overflow-y-auto space-y-1 text-[11px] scrollbar-hide"></div>
    </div>

    <div class="flex flex-col gap-3">
        <div class="grid grid-cols-4 gap-3">
            <div class="panel p-3">
                <div class="text-[9px] text-gray-500 uppercase">BTC Spot</div>
                <div id="price" class="text-2xl font-black text-white tabular-nums">0.00</div>
            </div>
            <div class="panel p-3 border-r-2 border-r-red-900">
                <div class="text-[9px] text-gray-500 uppercase">Strike (Target)</div>
                <input id="strike-manual" type="number" step="0.01" class="w-full bg-transparent text-2xl font-black text-red-500 outline-none" placeholder="0.00">
            </div>
            <div class="panel p-3">
                <div class="text-[9px] text-gray-500 uppercase">RSI (14)</div>
                <div id="rsi-val" class="text-2xl font-black text-purple-500">--</div>
            </div>
            <div id="conf-panel" class="panel p-3 transition-colors duration-500">
                <div class="text-[9px] text-gray-500 uppercase">Conf. Score</div>
                <div id="conf-val" class="text-2xl font-black">0%</div>
            </div>
        </div>
        
        <div class="panel flex-1 relative overflow-hidden" id="chart-box">
            <div id="chart" class="absolute inset-0"></div>
        </div>
    </div>

    <div id="signal-card" class="panel p-6 flex flex-col relative transition-all duration-300">
        <div class="flex justify-between items-center mb-8">
            <span class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Signal Hub V10</span>
            <div id="api-status" class="h-2 w-2 rounded-full bg-green-500"></div>
        </div>

        <div id="decision" class="flex-1 flex flex-col justify-center items-center text-center">
            <div class="text-gray-800 font-bold uppercase italic tracking-[0.2em]">Listening...</div>
        </div>

        <div class="mt-auto space-y-4 pt-6 border-t border-gray-900">
            <div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase">
                <span>Predict.fun Mid</span>
                <span id="prob-val" class="text-blue-500">50%</span>
            </div>
            <div class="w-full h-1 bg-gray-900 rounded-full overflow-hidden">
                <div id="prob-bar" class="h-full bg-blue-600 shadow-[0_0_10px_#2563eb]" style="width: 50%"></div>
            </div>
            <div class="flex justify-between items-end mt-2">
                <div class="text-[9px] text-gray-600 uppercase font-bold">Expires In</div>
                <div id="timer" class="text-5xl font-black tracking-tighter italic text-blue-500">00:00</div>
            </div>
        </div>
    </div>

    <script>
        let STRIKE = 0;
        let lastBTC = 0;
        let history = [];
        let nextRefresh = 60;
        const MARKET_ID = "btc-usd-up-down-2026-03-09-02-15";

        // Звуки
        const syncSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'); // Короткий клик
        const alertSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3'); // Сигнал тревоги
        syncSnd.volume = 0.2;
        alertSnd.volume = 0.5;

        // Инициализация графика
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0a0a0d' }, textColor: '#444' },
            grid: { vertLines: { color: '#131316' }, horzLines: { color: '#131316' } },
            timeScale: { timeVisible: true, borderVisible: false },
            rightPriceScale: { borderVisible: false, autoScale: true }
        });
        const series = chart.addCandlestickSeries({ upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false });
        let strikeLine = null;

        async function fullRefresh() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100');
                const data = await r.json();
                history = data.map(d => ({ time: d[0]/1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]) }));
                series.setData(history);
                chart.timeScale().fitContent();
                syncSnd.play(); // Звук обновления
                document.getElementById('chart-box').classList.add('update-flash');
                setTimeout(() => document.getElementById('chart-box').classList.remove('update-flash'), 400);
                nextRefresh = 60;
            } catch(e) {}
        }

        function calculateRSI(closes, period = 14) {
            if (closes.length < period + 1) return 50;
            let up = 0, down = 0;
            for (let i = closes.length - period; i < closes.length; i++) {
                let diff = closes[i] - closes[i-1];
                if (diff >= 0) up += diff; else down -= diff;
            }
            return 100 - (100 / (1 + (up / down || 1)));
        }

        function processLogic() {
            if (STRIKE <= 0 || history.length < 20) return;
            const rsi = calculateRSI(history.map(c => c.close));
            document.getElementById('rsi-val').innerText = rsi.toFixed(1);
            
            const delta = lastBTC - STRIKE;
            const decEl = document.getElementById('decision');
            const confEl = document.getElementById('conf-val');
            const card = document.getElementById('signal-card');
            
            let score = 0;
            // Логика набора очков уверенности
            if (Math.abs(delta) > 50) score += 40;
            if (rsi > 70 || rsi < 30) score += 40;
            if (Math.abs(delta) > 100) score += 20;

            confEl.innerText = score + "%";
            confEl.className = `text-2xl font-black ${score >= 70 ? 'text-blue-500' : 'text-gray-400'}`;

            if (score >= 80) {
                if (card.className.indexOf('alert-active') === -1) {
                    alertSnd.play(); // Звук сильного сигнала
                    card.classList.add('alert-active');
                }
                const side = delta > 0 ? 'DOWN' : 'UP';
                const color = delta > 0 ? 'text-red-500' : 'text-green-500';
                decEl.innerHTML = `<div class="${color} font-black text-7xl">${side}</div><div class="text-[10px] text-gray-500 mt-4 tracking-widest uppercase">High Confidence Entry</div>`;
            } else {
                card.classList.remove('alert-active');
                decEl.innerHTML = `<div class="text-gray-800 font-bold uppercase italic">Analyzing...</div>`;
            }
        }

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data);
            lastBTC = parseFloat(d.p);
            document.getElementById('price').innerText = lastBTC.toLocaleString();
            const time = Math.floor(d.E / 60000) * 60;
            series.update({ time, close: lastBTC });
            if (history.length > 0 && history[history.length-1].time === time) history[history.length-1].close = lastBTC;
            processLogic();
            
            const tape = document.getElementById('tape');
            tape.insertAdjacentHTML('afterbegin', `<div class="flex justify-between py-1 border-b border-gray-900"><span class="text-gray-600">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</span><span class="${lastBTC > STRIKE ? 'text-green-500' : 'text-red-500'} font-bold">${lastBTC.toFixed(1)}</span></div>`);
            if(tape.children.length > 30) tape.lastChild.remove();
        };

        document.getElementById('strike-manual').addEventListener('input', (e) => {
            STRIKE = parseFloat(e.target.value);
            if (strikeLine) series.removePriceLine(strikeLine);
            strikeLine = series.createPriceLine({ price: STRIKE, color: '#ef4444', lineWidth: 2, title: 'TARGET' });
        });

        async function syncMarket() {
            try {
                const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://api.predict.fun/v1/markets/'+MARKET_ID)}&_=${Date.now()}`;
                const r = await fetch(proxy); const d = await r.json();
                const s = parseFloat(d.strike_price || d.line || d.price_to_beat);
                if (s > 10000 && document.activeElement.id !== 'strike-manual') {
                    STRIKE = s; document.getElementById('strike-manual').value = STRIKE;
                    if (strikeLine) series.removePriceLine(strikeLine);
                    strikeLine = series.createPriceLine({ price: STRIKE, color: '#ef4444', lineWidth: 2, title: 'TARGET' });
                }
                document.getElementById('prob-val').innerText = Math.round(d.up_price || 50) + '%';
                document.getElementById('prob-bar').style.width = (d.up_price || 50) + '%';
            } catch(e) {}
        }

        setInterval(() => {
            const now = new Date();
            const remM = 14 - (now.getMinutes() % 15);
            const remS = 59 - now.getSeconds();
            document.getElementById('timer').innerText = `${remM}:${remS < 10 ? '0' : ''}${remS}`;
            nextRefresh--;
            document.getElementById('sync-timer').innerText = `Sync: ${nextRefresh}s`;
            if (nextRefresh <= 0) fullRefresh();
        }, 1000);

        fullRefresh();
        setInterval(syncMarket, 6000);
        syncMarket();
        new ResizeObserver(() => chart.applyOptions({ width: document.getElementById('chart-box').clientWidth, height: document.getElementById('chart-box').clientHeight })).observe(document.getElementById('chart-box'));
    </script>
</body>
</html>
