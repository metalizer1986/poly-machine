<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL | NO-VPN-CONFLICT</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05070a] text-gray-300 font-mono text-[11px] h-screen overflow-hidden p-2">
    <div class="grid grid-cols-[280px_1fr_300px] gap-2 h-full">
        
        <div class="bg-[#0b0e14] border border-[#1d2127] rounded flex flex-col overflow-hidden">
            <div class="p-2 border-b border-gray-800 text-blue-400 font-bold">ORDER BOOK</div>
            <div id="book" class="flex-1 p-2 space-y-1"></div>
            <div class="p-2 border-t border-gray-800">
                <div class="text-[9px] text-gray-500 uppercase">Live Tape</div>
                <div id="tape" class="h-40 overflow-y-auto text-[10px]"></div>
            </div>
        </div>

        <div class="bg-[#0b0e14] border border-[#1d2127] rounded relative">
            <div class="absolute top-4 left-4 z-50 bg-black/60 p-3 rounded border border-gray-800 backdrop-blur">
                <div class="text-[10px] text-gray-500">BTC/USDT</div>
                <div id="price" class="text-3xl font-bold text-white tracking-tighter">0.00</div>
                <div id="diff" class="text-xs font-bold">-- vs strike</div>
            </div>
            <div id="chart" class="w-full h-full"></div>
        </div>

        <div class="flex flex-col gap-2">
            <div class="bg-[#0b0e14] border border-blue-900/50 rounded p-4 text-center">
                <div class="text-[10px] text-gray-500 uppercase mb-4">Polymarket YES Price</div>
                <div id="poly-val" class="text-6xl font-black text-white py-4">--¢</div>
                <div id="status" class="text-[9px] font-bold text-yellow-600">CONNECTING...</div>
            </div>
            
            <div class="bg-[#0b0e14] border border-[#1d2127] rounded flex-1 flex flex-col items-center justify-center p-6 text-center">
                <div class="text-[10px] text-gray-500 uppercase">Expiration</div>
                <div id="timer" class="text-6xl font-black text-white my-4">06:00</div>
                <div id="signal" class="w-full py-3 rounded-full border border-gray-800 font-bold text-gray-600">WAITING SIGNAL</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const TID = "67404634114493846562791118559100324093748944985408299978272941795392737044375";
            const STRIKE = 67600;
            let lastBTC = 0;

            // Chart Init
            const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#0b0e14' }, textColor: '#707a8a' },
                grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
                timeScale: { timeVisible: true, borderColor: '#1d2127' }
            });
            const series = chart.addCandlestickSeries({ upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false });
            series.createPriceLine({ price: STRIKE, color: '#ff3b69', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'STRIKE' });

            // Binance WS
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
            ws.onmessage = e => {
                const d = JSON.parse(e.data);
                lastBTC = parseFloat(d.p);
                document.getElementById('price').innerText = lastBTC.toLocaleString();
                const delta = lastBTC - STRIKE;
                const diffEl = document.getElementById('diff');
                diffEl.innerText = (delta > 0 ? '+' : '') + delta.toFixed(2);
                diffEl.className = `text-xs font-bold ${delta > 0 ? 'text-green-400' : 'text-red-400'}`;
            };

            // Poly Fetch Logic
            async function syncPoly() {
                try {
                    const target = encodeURIComponent(`https://clob.polymarket.com/midpoint?token_id=${TID}`);
                    const response = await fetch(`https://api.allorigins.win/raw?url=${target}&cache=${Date.now()}`);
                    if(!response.ok) throw new Error();
                    const data = await response.json();
                    
                    if(data && data.midpoint) {
                        const m = parseFloat(data.midpoint);
                        const cents = (m * 100).toFixed(1);
                        document.getElementById('poly-val').innerText = cents + '¢';
                        document.getElementById('status').innerText = 'SYNC OK';
                        document.getElementById('status').className = 'text-[9px] font-bold text-green-500';
                        
                        const sig = document.getElementById('signal');
                        if (lastBTC > STRIKE + 15 && m < 0.75) {
                            sig.innerText = 'BULLISH EDGE: YES';
                            sig.className = 'w-full py-3 rounded-full border border-green-500 bg-green-500/10 font-bold text-green-500 animate-pulse';
                        } else {
                            sig.innerText = 'STABLE';
                            sig.className = 'w-full py-3 rounded-full border border-gray-800 font-bold text-gray-500';
                        }
                    }
                } catch(err) {
                    document.getElementById('status').innerText = 'RETRYING...';
                }
            }

            setInterval(syncPoly, 4000);
            syncPoly();

            // Simple Timer
            let sec = 360;
            setInterval(() => {
                sec--; if(sec < 0) sec = 360;
                const m = Math.floor(sec/60); const s = sec%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            }, 1000);
        })();
    </script>
</body>
</html>
