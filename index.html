<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMART TERMINAL V2 | FIXED</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020408; color: #e1e4e8; font-family: 'JetBrains Mono', monospace; font-size: 11px; margin: 0; overflow: hidden; }
        .panel { background: #0b0e14; border: 1px solid #1d2127; border-radius: 4px; }
        .glow-green { text-shadow: 0 0 20px rgba(0, 255, 173, 0.7); color: #00ffad; }
        .glow-red { text-shadow: 0 0 20px rgba(255, 59, 105, 0.7); color: #ff3b69; }
    </style>
</head>
<body class="p-2 h-screen grid grid-cols-[280px_1fr_350px] gap-2 bg-[#05070a] text-white">

    <aside class="panel flex flex-col overflow-hidden">
        <div class="p-2 border-b border-gray-800 text-[9px] font-bold text-blue-400 uppercase text-center">Live Tape (Binance)</div>
        <div id="tape" class="flex-1 overflow-y-auto p-2 font-bold space-y-1"></div>
    </aside>

    <main class="panel relative">
        <div class="absolute top-4 left-4 z-50 bg-black/80 p-4 border border-gray-700 rounded-lg backdrop-blur-md shadow-2xl">
            <div class="text-[10px] text-gray-500 uppercase font-black mb-1">BTC/USDT Spot</div>
            <div id="price" class="text-4xl font-black tracking-tighter text-white">0.00</div>
            <div id="diff" class="text-xs font-bold mt-2 px-2 py-0.5 rounded inline-block">Ожидание страйка...</div>
        </div>
        <div id="chart" class="w-full h-full"></div>
    </main>

    <aside class="flex flex-col gap-2">
        <div class="panel p-6 bg-gradient-to-b from-blue-900/10 to-transparent">
            <div class="text-center text-gray-500 uppercase text-[10px] mb-4 font-bold tracking-widest">Прогноз рынка (%)</div>
            <div class="bg-black/60 border border-gray-800 rounded-xl p-8 text-center shadow-2xl relative">
                <div id="pred-val" class="text-7xl font-black tracking-tighter text-white">--%</div>
                <div class="w-full bg-gray-900 h-2 mt-6 rounded-full overflow-hidden">
                    <div id="pred-bar" class="bg-blue-600 h-full transition-all duration-700" style="width: 50%"></div>
                </div>
                <div id="net-status" class="text-[8px] mt-4 text-green-500 font-bold uppercase tracking-widest">Sync: Predict.fun</div>
            </div>
        </div>

        <div id="signal-container" class="panel flex-1 flex flex-col items-center justify-center p-6 text-center transition-all duration-500">
            <div class="text-[10px] text-gray-500 uppercase font-bold mb-2">Алгоритм принятия решений</div>
            <div id="signal-content" class="w-full">
                <div class="text-gray-600 text-lg font-bold uppercase">Анализ...</div>
            </div>
            <div class="mt-8 border-t border-gray-800 pt-4 w-full">
                <div class="text-[10px] text-gray-500 uppercase mb-1">До экспирации (раунд 15м)</div>
                <div id="timer" class="text-6xl font-black text-white tracking-tighter italic">00:00</div>
            </div>
        </div>
    </aside>

    <script>
        // --- КОНСТАНТЫ ---
        const MARKET_ID = "btc-usd-up-down-2026-03-09-02-15"; 
        let STRIKE = 67600; // Резервное значение (подхватится из API)
        let lastBTC = 0;
        let lastSignalType = 'NONE';
        const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        // --- ГРАФИК ---
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0b0e14' }, textColor: '#707a8a' },
            grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
            timeScale: { borderColor: '#1d2127', timeVisible: true }
        });
        const series = chart.addCandlestickSeries({ upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false });
        let strikeLine = null;

        // --- ФУНКЦИЯ СИНХРОННОГО ТАЙМЕРА ---
        function updateTimer() {
            const now = new Date();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            // Находим сколько минут осталось до конца текущего 15-минутного интервала
            const remainMin = 14 - (minutes % 15);
            const remainSec = 59 - seconds;
            
            document.getElementById('timer').innerText = 
                `${remainMin}:${remainSec < 10 ? '0' : ''}${remainSec}`;
        }

        // --- ПОЛУЧЕНИЕ ДАННЫХ И СТРАЙКА ---
        async function getMarketData() {
            const url = `https://api.predict.fun/v1/markets/${MARKET_ID}`;
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&_=${Date.now()}`;
            
            try {
                const r = await fetch(proxy);
                const data = await r.json();
                
                // ЗАЩИТА: Обновляем страйк только если пришло реальное число > 1000
                const newStrike = parseFloat(data.strike_price || data.line);
                if (newStrike > 1000) {
                    STRIKE = newStrike;
                    if (strikeLine) series.removePriceLine(strikeLine);
                    strikeLine = series.createPriceLine({
                        price: STRIKE, color: '#ff3b69', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: `STRIKE: ${STRIKE}`
                    });
                }
                
                updateUI(Math.round(data.up_price || 50));
            } catch(e) { console.log("Ошибка API, используем кэш"); }
        }

        function updateUI(prob) {
            document.getElementById('pred-val').innerText = prob + '%';
            document.getElementById('pred-bar').style.width = prob + '%';

            if (!STRIKE || !lastBTC) return;
            const delta = lastBTC - STRIKE;
            const sigContainer = document.getElementById('signal-container');
            const sigContent = document.getElementById('signal-content');
            let currentSignal = 'NONE';

            // ИСПРАВЛЕННАЯ ЛОГИКА (delta не может быть 67000 если страйк верный)
            if (delta > 20 && prob < 60) {
                currentSignal = 'UP';
                sigContent.innerHTML = `<div class="text-green-500 animate-bounce text-xl font-black">▲ ЗАХОДИ В СДЕЛКУ!</div><div class="text-white text-2xl font-black">ОТКРЫВАЙ НА ПОВЫШЕНИЕ</div>`;
                sigContainer.className = 'panel flex-1 flex flex-col items-center justify-center p-6 text-center border-2 border-green-500 bg-green-500/10';
            } else if (delta < -20 && prob > 40) {
                currentSignal = 'DOWN';
                sigContent.innerHTML = `<div class="text-red-500 animate-bounce text-xl font-black">▼ ЗАХОДИ В СДЕЛКУ!</div><div class="text-white text-2xl font-black">ОТКРЫВАЙ НА ПОНИЖЕНИЕ</div>`;
                sigContainer.className = 'panel flex-1 flex flex-col items-center justify-center p-6 text-center border-2 border-red-500 bg-red-500/10';
            } else {
                sigContent.innerHTML = `<div class="text-gray-500 text-lg font-bold">Жди момента...</div>`;
                sigContainer.className = 'panel flex-1 flex flex-col items-center justify-center p-6 text-center border-gray-800';
            }

            if (currentSignal !== 'NONE' && currentSignal !== lastSignalType) alertSound.play().catch(()=>{});
            lastSignalType = currentSignal;
        }

        // --- BINANCE WS ---
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data);
            lastBTC = parseFloat(d.p);
            document.getElementById('price').innerText = lastBTC.toLocaleString();
            
            const diff = lastBTC - STRIKE;
            const diffEl = document.getElementById('diff');
            diffEl.innerText = `${diff > 0 ? '▲ +' : '▼ '}${diff.toFixed(2)} от страйка`;
            diffEl.className = `text-xs font-bold mt-2 px-2 py-0.5 rounded ${diff > 0 ? 'bg-green-900 text-green-400' : 'bg-red-900 text-red-400'}`;

            series.update({ time: Math.floor(d.E / 60000) * 60, close: lastBTC });
            const tape = document.getElementById('tape');
            tape.insertAdjacentHTML('afterbegin', `<div class="flex justify-between py-1 border-b border-gray-900/50 ${lastBTC > STRIKE ? 'text-green-500' : 'text-red-500'}"><span>${new Date().toLocaleTimeString()}</span><span>${lastBTC.toFixed(1)}</span></div>`);
            if(tape.children.length > 20) tape.lastChild.remove();
        };

        // Запуски
        setInterval(updateTimer, 1000);
        setInterval(getMarketData, 5000);
        getMarketData();
    </script>
</body>
</html>
