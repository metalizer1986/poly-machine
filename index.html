<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PREDICT.FUN SNIPER | BTC-15M</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #e1e4e8; font-family: 'JetBrains Mono', monospace; font-size: 11px; margin: 0; overflow: hidden; }
        .panel { background: #0b0e14; border: 1px solid #1d2127; border-radius: 4px; }
        .glow { text-shadow: 0 0 15px rgba(0, 255, 173, 0.5); }
    </style>
</head>
<body class="p-2 h-screen grid grid-cols-[280px_1fr_300px] gap-2">

    <aside class="flex flex-col gap-2">
        <div class="panel flex-1 flex flex-col">
            <div class="p-2 border-b border-gray-800 text-blue-400 font-bold uppercase text-[9px]">Live Binance Tape</div>
            <div id="tape" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        </div>
    </aside>

    <main class="panel relative">
        <div class="absolute top-4 left-4 z-50 bg-black/80 p-3 border border-gray-700 rounded backdrop-blur">
            <div class="text-[10px] text-gray-500 uppercase">BTC Spot</div>
            <div id="price" class="text-3xl font-black text-white glow">0.00</div>
            <div id="diff" class="text-[10px] font-bold mt-1">-- to strike</div>
        </div>
        <div id="chart" class="w-full h-full"></div>
    </main>

    <aside class="flex flex-col gap-2">
        <div class="panel p-6 border-blue-900/50 bg-blue-950/10">
            <h3 class="text-center text-gray-500 uppercase text-[10px] mb-4">Predict.fun Midpoint</h3>
            <div class="bg-black/40 border border-gray-800 rounded-lg p-6 text-center">
                <div id="pred-val" class="text-6xl font-black text-white glow">--%</div>
                <div class="w-full bg-gray-900 h-1.5 mt-4 rounded-full overflow-hidden">
                    <div id="pred-bar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
            <p id="net-status" class="text-[8px] text-center mt-4 text-yellow-600 font-bold uppercase tracking-widest">Awaiting API...</p>
        </div>

        <div class="panel flex-1 flex flex-col items-center justify-center p-6 text-center">
            <div class="text-[10px] text-gray-500 uppercase">Round Ends In</div>
            <div id="timer" class="text-7xl font-black text-white my-4">00:00</div>
            <div id="signal" class="w-full py-4 rounded border border-gray-800 text-gray-600 font-bold uppercase tracking-tighter">Analyzing...</div>
        </div>
    </aside>

    <script>
        const STRIKE = 67600; // Установи актуальный страйк здесь
        const MARKET_ID = "btc-usd-up-down-2026-03-09-02-15"; // ID из твоей ссылки
        let lastPrice = 0;

        // 1. Инициализация графика
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0b0e14' }, textColor: '#707a8a' },
            grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
            timeScale: { borderColor: '#1d2127', timeVisible: true }
        });
        const series = chart.addCandlestickSeries({ upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false });
        series.createPriceLine({ price: STRIKE, color: '#ff3b69', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'STRIKE' });

        // 2. Binance WebSocket (Цена без задержек)
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data);
            lastPrice = parseFloat(d.p);
            document.getElementById('price').innerText = lastPrice.toLocaleString();
            
            const delta = lastPrice - STRIKE;
            const diffEl = document.getElementById('diff');
            diffEl.innerText = (delta > 0 ? '+' : '') + delta.toFixed(2);
            diffEl.className = `text-[10px] font-bold ${delta > 0 ? 'text-green-400' : 'text-red-400'}`;

            const tape = document.getElementById('tape');
            tape.insertAdjacentHTML('afterbegin', `<div class="flex justify-between ${delta > 0 ? 'text-green-500' : 'text-red-500'}"><span>${new Date().toLocaleTimeString()}</span><span>${lastPrice.toFixed(1)}</span></div>`);
            if(tape.children.length > 30) tape.lastChild.remove();
        };

        // 3. Predict.fun API Fetch (Обход VPN через смену прокси)
        async function fetchPredict() {
            // Для Predict.fun используем их открытый эндпоинт данных
            const url = `https://api.predict.fun/v1/markets/${MARKET_ID}`; 
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&cb=${Date.now()}`;

            try {
                const res = await fetch(proxy);
                const data = await res.json();
                
                // Эмуляция получения цены контракта (midpoint)
                // Если API отдаст цену UP/DOWN, мы выведем вероятность
                if (data) {
                    const upProb = data.up_price || 50; // Пример поля
                    document.getElementById('pred-val').innerText = upProb + '%';
                    document.getElementById('pred-bar').style.width = upProb + '%';
                    document.getElementById('net-status').innerText = 'SYNC: PREDICT.FUN';
                    document.getElementById('net-status').className = 'text-[8px] text-center mt-4 text-green-500 font-bold';
                    updateSignal(upProb);
                }
            } catch (e) {
                document.getElementById('net-status').innerText = 'VPN/PROXY RETRYING...';
            }
        }

        function updateSignal(prob) {
            const sig = document.getElementById('signal');
            if (lastPrice > STRIKE + 5 && prob < 70) {
                sig.innerText = 'EDGE DETECTED: BUY UP';
                sig.className = 'w-full py-4 rounded border border-green-500 bg-green-500/10 text-green-500 font-bold animate-pulse';
            } else if (lastPrice < STRIKE - 5 && prob > 30) {
                sig.innerText = 'EDGE DETECTED: BUY DOWN';
                sig.className = 'w-full py-4 rounded border border-red-500 bg-red-500/10 text-red-500 font-bold animate-pulse';
            } else {
                sig.innerText = 'NO ALPHA';
                sig.className = 'w-full py-4 rounded border border-gray-800 text-gray-600 font-bold';
            }
        }

        // 4. Таймер раунда
        let s = 900; // 15 минут
        setInterval(() => {
            s--; if(s<0) s=900;
            const min = Math.floor(s/60); const sec = s%60;
            document.getElementById('timer').innerText = `${min}:${sec<10?'0':''}${sec}`;
        }, 1000);

        setInterval(fetchPredict, 5000);
        fetchPredict();
    </script>
</body>
</html>
