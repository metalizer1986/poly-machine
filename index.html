<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Polymarket Sniper Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #0b0e14; }
        body { background: var(--bg); color: #e1e4e8; font-family: 'JetBrains Mono', monospace; font-size: 11px; margin: 0; overflow: hidden; }
        .grid-layout { display: grid; grid-template-columns: 280px 1fr 300px; grid-template-rows: 1fr 140px; height: 100vh; gap: 6px; padding: 6px; }
        .panel { background: var(--panel); border: 1px solid #1d2127; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
    </style>
</head>
<body class="grid-layout">
    <aside class="flex flex-col gap-2">
        <div class="panel p-3 h-1/3 text-[10px]">
            <h3 class="text-blue-400">📊 Order Book</h3>
            <div id="asks" class="text-[#ff3b69]"></div>
            <div id="spread" class="text-gray-500 py-1 border-y border-gray-800 my-1">Spread: --</div>
            <div id="bids" class="text-[#00ffad]"></div>
        </div>
        <div class="panel flex-1">
            <div class="p-2 border-b border-gray-800 flex justify-between">
                <span>Live Sales</span>
                <span id="ws-status" class="text-green-500">WS LIVE</span>
            </div>
            <div id="sales-feed" class="flex-1 overflow-y-auto"></div>
        </div>
    </aside>

    <main class="panel relative">
        <div class="absolute top-3 left-3 z-10 bg-black/80 p-2 border border-gray-800 rounded">
            <p class="text-[9px] text-gray-500">BTC/USDT Spot</p>
            <p id="main-price" class="text-lg font-bold">0.00</p>
        </div>
        <div id="chart-container" style="width: 100%; height: 100%;"></div>
    </main>

    <aside class="flex flex-col gap-2">
        <div class="panel p-4">
            <h3 class="text-[9px] text-gray-500 uppercase">Polymarket Midpoint</h3>
            <p id="poly-val" class="text-4xl font-black">--¢</p>
            <div id="edge-val" class="text-gray-500 font-bold mt-4">WAITING...</div>
        </div>
        <div class="panel flex-1 flex flex-col items-center justify-center">
            <div id="timer" class="text-5xl font-black">08:00</div>
        </div>
    </aside>

    <script>
        // Твой свежий токен
        const POLY_TOKEN_ID = "73386326250505661166199820758407085740901435999806488177463982633430474049621";
        const PROXY = "https://groqproxy.popkosasha86.workers.dev/?url=";

        // 1. Инициализация графика с задержкой
        setTimeout(() => {
            const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { color: '#0b0e14' }, textColor: '#707a8a' },
                grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } }
            });
            const candleSeries = chart.addCandlestickSeries();
            fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=15m&limit=50")
                .then(r => r.json()).then(d => candleSeries.setData(d.map(x => ({time: x[0]/1000, open: +x[1], high: +x[2], low: +x[3], close: +x[4]}))));
        }, 500);

        // 2. Binance WS
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade/btcusdt@depth5@100ms');
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.e === 'trade') {
                document.getElementById('main-price').innerText = (+d.p).toLocaleString();
                const feed = document.getElementById('sales-feed');
                feed.insertAdjacentHTML('afterbegin', `<div class="text-[10px] grid grid-cols-2"><span>${(+d.p).toFixed(1)}</span><span>${(+d.q).toFixed(3)}</span></div>`);
                if(feed.children.length > 20) feed.lastChild.remove();
            } else if (d.asks) {
                document.getElementById('asks').innerHTML = d.asks.map(x => `<div>${(+x[0]).toFixed(1)}</div>`).join('');
                document.getElementById('bids').innerHTML = d.bids.map(x => `<div>${(+x[0]).toFixed(1)}</div>`).join('');
            }
        };

        // 3. Polymarket Data
        async function fetchPoly() {
            try {
                const target = `https://clob.polymarket.com/midpoint?token_id=${POLY_TOKEN_ID}`;
                const res = await fetch(PROXY + encodeURIComponent(target));
                const data = await res.json();
                if (data.midpoint) {
                    document.getElementById('poly-val').innerText = (data.midpoint * 100).toFixed(1) + '¢';
                    document.getElementById('edge-val').innerText = 'DATA OK';
                    document.getElementById('edge-val').className = 'text-green-500 font-bold mt-4';
                }
            } catch (e) { 
                document.getElementById('edge-val').innerText = 'API ERR';
                console.error(e); 
            }
        }
        setInterval(fetchPoly, 5000);
        fetchPoly();
    </script>
</body>
</html>
