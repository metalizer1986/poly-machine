<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL V18.3 | PRO-TRADER</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #02040a; color: #cbd5e1; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .panel { background: #0b0e14; border: 1px solid #1e293b; border-radius: 8px; }
        .input-strike { background: #0f172a; border: 1px solid #334155; color: #38bdf8; font-weight: 800; }
        #signal-text { font-size: clamp(3rem, 10vw, 7rem); line-height: 1; text-align: center; width: 100%; display: block; }
        .glow-text { animation: glow 1s infinite alternate; }
        @keyframes glow { from { opacity: 0.6; } to { opacity: 1; } }
        .up { color: #10b981; }
        .down { color: #ef4444; }
    </style>
</head>
<body class="h-screen p-3 grid grid-cols-[310px_1fr_320px] gap-3">

    <div class="panel p-4 flex flex-col gap-4 overflow-y-auto">
        <div class="border-b border-slate-800 pb-2 flex justify-between items-center">
            <span class="text-[10px] font-black text-blue-400 uppercase italic">V18.3 PRO-TRADER</span>
            <div class="text-[8px] px-2 py-0.5 rounded bg-blue-500/10 text-blue-500 border border-blue-500/50 font-bold uppercase">MACD & BB Active</div>
        </div>
        
        <div class="space-y-4">
            <div class="panel bg-slate-900/50 p-3 border-blue-500/20">
                <div class="text-[9px] text-slate-500 uppercase font-black mb-2 italic">Strike Control</div>
                <div class="flex gap-2">
                    <input type="number" id="strike-input" class="input-strike w-full p-2 rounded text-lg tabular-nums" placeholder="0.00">
                    <button onclick="setManualStrike()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 rounded font-bold text-xs uppercase">Set</button>
                </div>
            </div>

            <div class="stat-card p-3 border-l-2 border-blue-800 bg-blue-950/5">
                <div class="text-[8px] text-blue-600 uppercase font-black mb-1">EMA 9/21 Trend</div>
                <div id="ema-status" class="text-[11px] font-bold">Scanning...</div>
            </div>

            <div class="stat-card p-3 border-l-2 border-purple-800 bg-purple-950/5">
                <div class="text-[8px] text-purple-500 uppercase font-black mb-1">MACD (12, 26, 9)</div>
                <div id="macd-status" class="text-[11px] font-bold">Waiting...</div>
            </div>

            <div class="stat-card p-3 border-l-2 border-amber-800 bg-amber-950/5">
                <div class="text-[8px] text-amber-600 uppercase font-black mb-1">Bollinger Bands</div>
                <div id="bb-status" class="text-[11px] font-bold">Analyzing...</div>
            </div>

            <div class="stat-card p-3 border-l-2 border-slate-800">
                <div class="text-[8px] text-slate-500 uppercase font-black mb-1">RSI (14)</div>
                <div id="rsi-val" class="text-lg font-black tabular-nums">--</div>
            </div>
        </div>
    </div>

    <div class="flex flex-col gap-3">
        <div class="grid grid-cols-4 gap-3 text-center">
            <div class="panel p-3"><div class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">BTC Price</div><div id="price" class="text-xl font-black text-white">0.00</div></div>
            <div class="panel p-3 border-b-2 border-blue-600"><div class="text-[8px] text-blue-500 font-bold italic uppercase">Manual Strike</div><div id="strike-display" class="text-xl font-black text-blue-400">0.00</div></div>
            <div class="panel p-3"><div class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Confidence</div><div id="conf-val" class="text-xl font-black text-blue-500">0%</div></div>
            <div class="panel p-3"><div class="text-[8px] text-slate-500 font-bold italic uppercase">Cycle</div><div id="timer" class="text-xl font-black text-slate-400 tabular-nums">00:00</div></div>
        </div>
        <div class="panel flex-1 relative overflow-hidden" id="chart-box"><div id="chart" class="absolute inset-0"></div></div>
    </div>

    <div id="decision-panel" class="panel p-4 flex flex-col items-center justify-between text-center border-l-4 border-blue-900 overflow-hidden">
        <div class="w-full text-left uppercase text-[10px] font-black text-slate-700 tracking-[0.3em] italic italic">Decision Engine</div>
        <div id="main-signal">
            <div id="signal-text" class="text-slate-800 font-black italic tracking-tighter">WAIT</div>
            <div id="signal-sub" class="text-[11px] text-slate-500 mt-4 uppercase font-bold tracking-[0.3em]">Analyzing Market</div>
        </div>
        <div class="w-full space-y-2">
            <div class="flex justify-between text-[8px] font-black text-slate-600 uppercase italic"><span>Signal Power</span><span id="power-percent">0%</span></div>
            <div class="h-1.5 bg-slate-950 rounded-full overflow-hidden border border-slate-800"><div id="conf-bar" class="h-full bg-gradient-to-r from-blue-800 to-blue-400 transition-all duration-700" style="width: 0%"></div></div>
        </div>
    </div>

    <script>
        const TG_TOKEN = "8624536975:AAE-2JPl3JSxQ247jPxm9P0QFN6_8H7Z31w";
        const CHAT_ID = "8624536975"; 
        let lastSentCycle = -1; 
        let STRIKE = 0, lastBTC = 0, history = [], currentCandle = null;
        let strikeLine = null, bbUpper = null, bbLower = null;

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0b0e14' }, textColor: '#64748b' },
            grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
            rightPriceScale: { borderVisible: false, autoScale: true },
            timeScale: { borderVisible: false }
        });
        const series = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false });
        
        // Bollinger Series
        const upperSeries = chart.addLineSeries({ color: 'rgba(56, 189, 248, 0.3)', lineWidth: 1, lineStyle: 2 });
        const lowerSeries = chart.addLineSeries({ color: 'rgba(56, 189, 248, 0.3)', lineWidth: 1, lineStyle: 2 });

        function playAlert() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        }

        function setManualStrike() {
            const val = parseFloat(document.getElementById('strike-input').value);
            if (!isNaN(val)) {
                STRIKE = val;
                document.getElementById('strike-display').innerText = STRIKE.toFixed(2);
                if (strikeLine) series.removePriceLine(strikeLine);
                strikeLine = series.createPriceLine({ price: STRIKE, color: '#3b82f6', lineWidth: 2, lineStyle: 0, title: 'TARGET' });
            }
        }

        // Indicators Logic
        function calcEMA(data, p) {
            let k = 2/(p+1), e = data[0];
            return data.reduce((acc, val) => val * k + acc * (1 - k), e);
        }

        function calcMACD() {
            const closes = history.map(h => h.close);
            const ema12 = calcEMA(closes.slice(-12), 12);
            const ema26 = calcEMA(closes.slice(-26), 26);
            const macd = ema12 - ema26;
            return macd;
        }

        function calcBB(p=20, std=2) {
            const closes = history.map(h => h.close).slice(-p);
            const avg = closes.reduce((a, b) => a + b) / p;
            const dev = Math.sqrt(closes.map(x => Math.pow(x - avg, 2)).reduce((a, b) => a + b) / p);
            return { mid: avg, upper: avg + (dev * std), lower: avg - (dev * std) };
        }

        function getRSI(p=14) {
            const c = history.map(h => h.close);
            let up=0, dn=0;
            for(let i=c.length-p; i<c.length; i++) {
                let d = c[i]-c[i-1];
                if(d > 0) up += d; else dn -= d;
            }
            return 100 - (100 / (1 + (up/dn || 1)));
        }

        function update() {
            if (history.length < 30 || STRIKE === 0) return;
            const delta = lastBTC - STRIKE;
            const rsi = getRSI();
            const ema9 = calcEMA(history.map(h => h.close).slice(-9), 9);
            const ema21 = calcEMA(history.map(h => h.close).slice(-21), 21);
            const macd = calcMACD();
            const bb = calcBB();

            // UI Updates
            document.getElementById('rsi-val').innerText = rsi.toFixed(1);
            document.getElementById('ema-status').innerText = ema9 > ema21 ? "BULLISH" : "BEARISH";
            document.getElementById('ema-status').className = ema9 > ema21 ? "text-[11px] font-bold up" : "text-[11px] font-bold down";
            document.getElementById('macd-status').innerText = macd > 0 ? "POSITIVE IMPULSE" : "NEGATIVE IMPULSE";
            document.getElementById('macd-status').className = macd > 0 ? "text-[11px] font-bold up" : "text-[11px] font-bold down";
            
            const bbPos = lastBTC > bb.upper ? "OVERBOUGHT" : lastBTC < bb.lower ? "OVERSOLD" : "NEUTRAL";
            document.getElementById('bb-status').innerText = bbPos;

            // Signal Logic
            let score = 15;
            if (ema9 > ema21 && delta < 0) score += 25;
            if (ema9 < ema21 && delta > 0) score += 25;
            if (macd > 0 && delta < 0) score += 15;
            if (macd < 0 && delta > 0) score += 15;
            if (lastBTC < bb.lower && delta < 0) score += 20; // Отскок от нижней границы
            if (lastBTC > bb.upper && delta > 0) score += 20; // Отскок от верхней границы

            const conf = Math.max(5, Math.min(score, 99));
            document.getElementById('conf-val').innerText = conf + "%";
            document.getElementById('power-percent').innerText = conf + "%";
            document.getElementById('conf-bar').style.width = conf + "%";

            const sigText = document.getElementById('signal-text');
            if (conf >= 75) {
                const side = delta > 0 ? 'DOWN' : 'UP';
                sigText.innerText = side;
                sigText.className = (side === 'UP' ? 'up' : 'down') + ' font-black italic tracking-tighter glow-text';
                
                const now = new Date();
                const currentCycle = Math.floor(now.getMinutes() / 15);
                if (lastSentCycle !== currentCycle) {
                    playAlert();
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(`🔥 <b>PRO SIGNAL</b>\n\nSide: <b>${side}</b>\nConf: <b>${conf}%</b>\n\nBTC: ${lastBTC}\nMACD: ${macd.toFixed(2)}\nBB: ${bbPos}`)}&parse_mode=HTML`);
                    lastSentCycle = currentCycle;
                }
            } else {
                sigText.innerText = "WAIT";
                sigText.className = "text-slate-800 font-black italic tracking-tighter";
            }

            // Update BB Lines on Chart
            upperSeries.update({ time: currentCandle.time, value: bb.upper });
            lowerSeries.update({ time: currentCandle.time, value: bb.lower });
        }

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data); lastBTC = parseFloat(d.p);
            document.getElementById('price').innerText = lastBTC.toLocaleString();
            const time = Math.floor(d.E/60000)*60;
            if(!currentCandle || time > currentCandle.time) {
                currentCandle = { time, open: lastBTC, high: lastBTC, low: lastBTC, close: lastBTC };
                history.push(currentCandle);
                if(history.length > 200) history.shift();
            } else {
                currentCandle.close = lastBTC; currentCandle.high = Math.max(currentCandle.high, lastBTC); currentCandle.low = Math.min(currentCandle.low, lastBTC);
            }
            series.update(currentCandle); update();
        };

        async function init() {
            const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100');
            const data = await r.json();
            history = data.map(d => ({ time: d[0]/1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]) }));
            series.setData(history);
            currentCandle = history[history.length-1];
            STRIKE = Math.round(currentCandle.close);
            document.getElementById('strike-input').value = STRIKE;
            setManualStrike();
        }

        setInterval(() => {
            const now = new Date();
            const remM = 14 - (now.getMinutes() % 15);
            const remS = 59 - now.getSeconds();
            document.getElementById('timer').innerText = `${remM}:${remS < 10 ? '0' : ''}${remS}`;
        }, 1000);

        init();
        new ResizeObserver(() => chart.applyOptions({ width: document.getElementById('chart-box').clientWidth, height: document.getElementById('chart-box').clientHeight })).observe(document.getElementById('chart-box'));
        document.body.onclick = () => { console.log("Audio Enabled"); };
    </script>
</body>
</html>
