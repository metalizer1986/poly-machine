<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL V17.7 | TELEGRAM PRO</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #02040a; color: #cbd5e1; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .panel { background: #0b0e14; border: 1px solid #1e293b; border-radius: 8px; }
        .signal-up { color: #10b981; text-shadow: 0 0 25px rgba(16,185,129,0.7); }
        .signal-down { color: #ef4444; text-shadow: 0 0 25px rgba(239,68,68,0.7); }
        .tg-active { color: #0088cc; border-color: #0088cc; }
    </style>
</head>
<body class="h-screen p-3 grid grid-cols-[310px_1fr_320px] gap-3">

    <div class="panel p-4 flex flex-col gap-4 overflow-y-auto">
        <div class="border-b border-slate-800 pb-2 flex justify-between items-center">
            <span class="text-[10px] font-black text-sky-400 uppercase italic">Telegram Link V17.7</span>
            <div id="tg-status" class="text-[8px] px-2 py-0.5 rounded tg-active border font-bold uppercase">Bot Online</div>
        </div>
        
        <div class="space-y-4">
            <div class="panel bg-slate-900/50 p-4 border-sky-500/30">
                <div class="text-[9px] text-slate-500 uppercase font-black mb-1">Auto-Midpoint</div>
                <div id="dist-val" class="text-3xl font-black tabular-nums text-white">0.00</div>
                <div id="dist-status" class="text-[9px] font-bold uppercase mt-1 text-sky-500">Sync Active</div>
            </div>

            <div class="stat-card p-2 border-l-2 border-slate-700">
                <div class="text-[8px] text-slate-500 uppercase">RSI Strength</div>
                <div id="rsi-val" class="text-sm font-bold">--</div>
            </div>
            
            <div class="stat-card p-2 border-l-2 border-slate-700">
                <div class="text-[8px] text-slate-500 uppercase">Trend (EMA)</div>
                <div id="ema-status" class="text-sm font-bold">--</div>
            </div>
        </div>

        <div class="mt-auto panel bg-sky-950/10 p-3 border-sky-900/30">
            <div class="text-[10px] text-sky-400 font-bold mb-1 italic">Bot Config:</div>
            <div class="text-[9px] text-slate-400">Signal Threshold: 75%<br>Interval: 15m Cycles</div>
        </div>
    </div>

    <div class="flex flex-col gap-3">
        <div class="grid grid-cols-4 gap-3 text-center">
            <div class="panel p-3">
                <div class="text-[8px] text-slate-500 font-bold">BTC SPOT</div>
                <div id="price" class="text-xl font-black text-white">0.00</div>
            </div>
            <div class="panel p-3 border-b-2 border-sky-500">
                <div class="text-[8px] text-slate-500 font-bold">STRIKE</div>
                <div id="strike-display" class="text-xl font-black text-sky-400">0.00</div>
            </div>
            <div class="panel p-3">
                <div class="text-[8px] text-slate-500 font-bold">CONFIDENCE</div>
                <div id="conf-val" class="text-xl font-black text-blue-500">0%</div>
            </div>
            <div class="panel p-3">
                <div class="text-[8px] text-slate-500 font-bold italic">TIMER</div>
                <div id="timer" class="text-xl font-black text-slate-400 italic">00:00</div>
            </div>
        </div>
        <div class="panel flex-1 relative" id="chart-box"><div id="chart" class="absolute inset-0"></div></div>
    </div>

    <div class="panel p-6 flex flex-col items-center justify-between text-center border-l-4 border-sky-900">
        <div class="w-full text-left uppercase text-[10px] font-black text-slate-600 tracking-widest italic">Decision Hub</div>
        
        <div id="main-signal">
            <div id="signal-text" class="text-slate-800 font-black text-8xl italic">WAIT</div>
            <div id="signal-sub" class="text-[10px] text-slate-500 mt-4 uppercase font-bold tracking-widest">Scanning Cycle</div>
        </div>

        <div class="w-full">
            <div class="h-1 bg-slate-900 rounded-full overflow-hidden">
                <div id="conf-bar" class="h-full bg-sky-600 transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        const TG_TOKEN = "8624536975:AAE-2JPl3JSxQ247jPxm9P0QFN6_8H7Z31w";
        let CHAT_ID = "YOUR_CHAT_ID"; // Вставь сюда свой ID
        let lastSentCycle = -1; 

        let STRIKE = 0, lastBTC = 0, history = [], currentCandle = null, strikeLine = null;
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0b0e14' }, textColor: '#64748b' },
            grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
            rightPriceScale: { borderVisible: false }, timeScale: { borderVisible: false }
        });
        const series = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false });

        async function sendTelegram(msg) {
            if (!CHAT_ID || CHAT_ID === "YOUR_CHAT_ID") {
                console.log("Telegram Error: Вставьте свой chat_id в код!");
                return;
            }
            try {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
            } catch (e) { console.error("TG Send Failed", e); }
        }

        function syncMidpoint(price) {
            STRIKE = Math.round(price);
            document.getElementById('strike-display').innerText = STRIKE.toFixed(2);
            if (strikeLine) series.removePriceLine(strikeLine);
            strikeLine = series.createPriceLine({ price: STRIKE, color: '#0088cc', lineWidth: 2, lineStyle: 2, title: 'MIDPOINT' });
        }

        async function init() {
            const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100');
            const data = await r.json();
            history = data.map(d => ({ time: d[0]/1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]) }));
            series.setData(history);
            currentCandle = history[history.length-1];
            syncMidpoint(currentCandle.close);
        }

        function getRSI(p=14) {
            const c = history.map(h => h.close);
            let up=0, dn=0;
            for(let i=c.length-p; i<c.length; i++) {
                let d = c[i]-c[i-1];
                if(d > 0) up += d; else dn -= d;
            }
            return 100 - (100 / (1 + (up/dn || 1)));
        }

        function update() {
            if (history.length < 30) return;
            const delta = lastBTC - STRIKE;
            const rsi = getRSI();
            const now = new Date();
            const currentCycle = Math.floor(now.getMinutes() / 15);
            
            document.getElementById('dist-val').innerText = Math.abs(delta).toFixed(2);
            document.getElementById('rsi-val').innerText = rsi.toFixed(1);

            let score = 20;
            if (delta < 0 && rsi < 40) score += 40;
            if (delta > 0 && rsi > 60) score += 40;

            const conf = Math.max(5, Math.min(score, 99));
            document.getElementById('conf-val').innerText = conf + "%";
            document.getElementById('conf-bar').style.width = conf + "%";

            const sigText = document.getElementById('signal-text');
            if (conf >= 75) {
                const side = delta > 0 ? 'DOWN' : 'UP';
                sigText.innerText = side;
                sigText.className = (side === 'UP' ? 'signal-up' : 'signal-down') + ' font-black text-8xl italic';
                
                // TELEGRAM LOGIC: Send once per 15m cycle
                if (lastSentCycle !== currentCycle) {
                    const msg = `🚀 <b>SIGNAL DETECTED!</b>\n\nSide: <b>${side}</b>\nConfidence: <b>${conf}%</b>\nPrice: ${lastBTC}\nStrike: ${STRIKE}\nTime: ${now.toLocaleTimeString()}`;
                    sendTelegram(msg);
                    lastSentCycle = currentCycle;
                }
            } else {
                sigText.innerText = "WAIT";
                sigText.className = "text-slate-800 font-black text-8xl italic";
            }
        }

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data); lastBTC = parseFloat(d.p);
            document.getElementById('price').innerText = lastBTC.toLocaleString();
            const time = Math.floor(d.E/60000)*60;
            const now = new Date();
            if (now.getMinutes() % 15 === 0 && now.getSeconds() === 0) syncMidpoint(lastBTC);

            if(!currentCandle || time > currentCandle.time) {
                currentCandle = { time, open: lastBTC, high: lastBTC, low: lastBTC, close: lastBTC };
                history.push(currentCandle);
            } else {
                currentCandle.close = lastBTC; currentCandle.high = Math.max(currentCandle.high, lastBTC); currentCandle.low = Math.min(currentCandle.low, lastBTC);
            }
            series.update(currentCandle); update();
        };

        setInterval(() => {
            const now = new Date();
            const remM = 14 - (now.getMinutes() % 15);
            const remS = 59 - now.getSeconds();
            document.getElementById('timer').innerText = `${remM}:${remS < 10 ? '0' : ''}${remS}`;
        }, 1000);

        init();
        new ResizeObserver(() => chart.applyOptions({ width: document.getElementById('chart-box').clientWidth, height: document.getElementById('chart-box').clientHeight })).observe(document.getElementById('chart-box'));
    </script>
</body>
</html>
