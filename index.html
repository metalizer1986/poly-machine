<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL ALPHA V15.3 | VISUAL STRIKE</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { background: #010204; color: #cbd5e1; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .panel { background: #080a0f; border: 1px solid #1e293b; border-radius: 12px; }
        .alert-active { border-color: #3b82f6 !important; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        #tape div { border-bottom: 1px solid rgba(30, 41, 59, 0.3); padding: 4px 0; }
    </style>
</head>
<body class="h-screen p-4 grid grid-cols-[260px_1fr_360px] gap-4">

    <div class="panel p-4 flex flex-col overflow-hidden">
        <div class="text-[10px] text-blue-500 font-black mb-3 border-b border-slate-800 pb-2">LIVE TICKER</div>
        <div id="tape" class="flex-1 overflow-y-auto space-y-1 text-[10px] tabular-nums scrollbar-hide"></div>
    </div>

    <div class="flex flex-col gap-4">
        <div class="grid grid-cols-4 gap-4">
            <div class="panel p-4">
                <div class="text-[9px] text-slate-500 uppercase font-bold">BTC Spot</div>
                <div id="price" class="text-2xl font-black text-white tabular-nums">0.00</div>
            </div>
            <div class="panel p-4 border-r-2 border-red-600/50">
                <div class="text-[9px] text-slate-500 uppercase font-bold">Strike Price</div>
                <input id="strike-manual" type="number" step="0.01" class="w-full bg-transparent text-2xl font-black text-red-500 outline-none" placeholder="0.00">
            </div>
            <div class="panel p-4">
                <div class="text-[9px] text-slate-500 uppercase font-bold">RSI (14)</div>
                <div id="rsi-val" class="text-2xl font-black text-purple-400">--</div>
            </div>
            <div class="panel p-4">
                <div class="text-[9px] text-slate-500 uppercase font-bold">Conf. Score</div>
                <div id="conf-val" class="text-2xl font-black text-slate-600">0%</div>
            </div>
        </div>
        <div class="panel flex-1 relative overflow-hidden" id="chart-box">
            <div id="chart" class="absolute inset-0"></div>
        </div>
    </div>

    <div id="signal-card" class="panel p-6 flex flex-col transition-all duration-300">
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] font-bold text-slate-600 uppercase italic">V15.3 Visual</span>
            <div id="timer" class="text-3xl font-black tracking-tighter text-slate-500 italic">00:00</div>
        </div>
        <div id="decision" class="flex-1 flex flex-col justify-center items-center text-center">
            <div class="text-slate-800 font-bold uppercase tracking-[0.2em] animate-pulse">Waiting for Data</div>
        </div>
        <div class="mt-auto pt-6 border-t border-slate-800/40 space-y-4">
            <div class="flex justify-between items-center bg-slate-900/40 p-4 rounded-lg">
                <div class="flex flex-col">
                    <span class="text-[9px] text-slate-500 uppercase font-black">ROI Potential</span>
                    <span id="roi-val" class="text-lg font-black text-green-500">--%</span>
                </div>
                <div class="text-right flex flex-col">
                    <span class="text-[9px] text-slate-500 uppercase font-black">Risk Level</span>
                    <span id="risk-status" class="text-lg font-black text-blue-500">LOW</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let STRIKE = 0, lastBTC = 0, history = [], currentCandle = null;
        let strikeLine = null; // Хранилище для линии на графике
        const alertSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3');
        alertSnd.volume = 0.3;

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#080a0f' }, textColor: '#64748b' },
            grid: { vertLines: { color: '#111827' }, horzLines: { color: '#111827' } },
            timeScale: { timeVisible: true, borderVisible: false },
            rightPriceScale: { borderVisible: false, autoScale: true }
        });
        const series = chart.addCandlestickSeries({ upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false });

        // Функция отрисовки линии страйка
        function drawStrikeLine(price) {
            if (strikeLine) {
                series.removePriceLine(strikeLine);
            }
            if (price > 0) {
                strikeLine = series.createPriceLine({
                    price: price,
                    color: '#ff4444',
                    lineWidth: 3,
                    lineStyle: LightweightCharts.LineStyle.Solid,
                    axisLabelVisible: true,
                    title: 'STRIKE',
                });
            }
        }

        async function loadHistory() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100');
                const data = await r.json();
                history = data.map(d => ({
                    time: d[0] / 1000,
                    open: parseFloat(d[1]), high: parseFloat(d[2]),
                    low: parseFloat(d[3]), close: parseFloat(d[4])
                }));
                series.setData(history);
                currentCandle = history[history.length - 1];
            } catch(e) {}
        }

        function calculateRSI() {
            if (history.length < 15) return 50;
            const closes = history.slice(-15).map(c => c.close);
            let up = 0, down = 0;
            for (let i = 1; i < closes.length; i++) {
                let diff = closes[i] - closes[i-1];
                if (diff >= 0) up += diff; else down -= diff;
            }
            return 100 - (100 / (1 + (up / (down || 1))));
        }

        function updateUI() {
            const rsi = calculateRSI();
            document.getElementById('rsi-val').innerText = rsi.toFixed(1);
            
            const delta = lastBTC - STRIKE;
            const now = new Date();
            const remM = 14 - (now.getMinutes() % 15);
            
            let score = 0;
            if (STRIKE > 0) {
                if (Math.abs(delta) > 50) score += 40;
                if (rsi > 70 || rsi < 30) score += 40;
            }

            document.getElementById('conf-val').innerText = score + "%";
            const decEl = document.getElementById('decision');
            const card = document.getElementById('signal-card');

            if (score >= 70 && remM >= 3) {
                if (!card.classList.contains('alert-active')) { alertSnd.play(); card.classList.add('alert-active'); }
                decEl.innerHTML = `<div class="${delta > 0 ? 'text-red-500' : 'text-green-500'} font-black text-8xl">${delta > 0 ? 'DOWN' : 'UP'}</div>`;
            } else {
                card.classList.remove('alert-active');
                decEl.innerHTML = `<div class="text-slate-800 font-bold uppercase tracking-widest text-sm">Monitoring...</div>`;
            }
        }

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data);
            lastBTC = parseFloat(d.p);
            const time = Math.floor(d.E / 60000) * 60;
            document.getElementById('price').innerText = lastBTC.toLocaleString();

            if (!currentCandle || time > currentCandle.time) {
                currentCandle = { time, open: lastBTC, high: lastBTC, low: lastBTC, close: lastBTC };
                history.push(currentCandle);
            } else {
                currentCandle.close = lastBTC;
                currentCandle.high = Math.max(currentCandle.high, lastBTC);
                currentCandle.low = Math.min(currentCandle.low, lastBTC);
            }
            series.update(currentCandle);

            const tape = document.getElementById('tape');
            tape.insertAdjacentHTML('afterbegin', `<div class="flex justify-between"><span>${new Date().toLocaleTimeString()}</span><span class="${lastBTC > STRIKE ? 'text-green-500' : 'text-red-500'} font-bold">${lastBTC.toFixed(1)}</span></div>`);
            if(tape.children.length > 30) tape.lastChild.remove();

            updateUI();
        };

        const strikeInput = document.getElementById('strike-manual');
        strikeInput.addEventListener('input', (e) => {
            STRIKE = parseFloat(e.target.value);
            drawStrikeLine(STRIKE); // Мгновенная отрисовка при вводе
        });

        async function syncMarket() {
            if (document.activeElement === strikeInput) return;
            try {
                const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://api.predict.fun/v1/markets/btc-usd-up-down-2026-03-09-02-15')}&_=${Date.now()}`;
                const r = await fetch(proxy); const d = await r.json();
                const s = parseFloat(d.strike_price || d.line || d.price_to_beat);
                if (s > 1000) { 
                    STRIKE = s; 
                    strikeInput.value = STRIKE; 
                    drawStrikeLine(STRIKE); 
                }
            } catch(e) {}
        }

        setInterval(() => {
            const now = new Date();
            const remM = 14 - (now.getMinutes() % 15);
            const remS = 59 - now.getSeconds();
            document.getElementById('timer').innerText = `${remM}:${remS < 10 ? '0' : ''}${remS}`;
        }, 1000);

        loadHistory();
        setInterval(syncMarket, 10000);
        new ResizeObserver(() => chart.applyOptions({ width: document.getElementById('chart-box').clientWidth, height: document.getElementById('chart-box').clientHeight })).observe(document.getElementById('chart-box'));
    </script>
</body>
</html>
