<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Polymarket Sniper | 15M-BTC</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #05070a; --panel: #0b0e14; --border: #1d2127; }
        body { background: var(--bg); color: #e1e4e8; font-family: 'JetBrains Mono', monospace; font-size: 11px; margin: 0; overflow: hidden; }
        .grid-layout { display: grid; grid-template-columns: 280px 1fr 300px; height: 100vh; gap: 6px; padding: 6px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        .header-sub { color: #5d6773; font-size: 9px; text-transform: uppercase; font-weight: bold; }
        #chart-container { width: 100%; height: 100%; }
        .trade-row { font-size: 10px; border-bottom: 1px solid #161b22; padding: 2px 6px; display: flex; justify-content: space-between; }
        .glow-text { text-shadow: 0 0 12px rgba(0, 255, 173, 0.4); }
    </style>
</head>
<body class="grid-layout">

    <aside class="flex flex-col gap-2 overflow-hidden">
        <div class="panel p-3 h-1/2">
            <h3 class="header-sub mb-2 text-blue-400">📊 Order Book</h3>
            <div id="asks" class="text-[#ff3b69]"></div>
            <div id="spread" class="text-center py-1 border-y border-gray-800 my-1 text-gray-500">---</div>
            <div id="bids" class="text-[#00ffad]"></div>
        </div>
        <div class="panel flex-1">
            <div class="p-2 border-b border-gray-800 flex justify-between">
                <span class="header-sub text-white font-bold">Live Sales</span>
                <span id="ws-status" class="text-[8px] text-green-500 bg-green-500/10 px-1 rounded">WS CONNECTED</span>
            </div>
            <div id="sales-feed" class="flex-1 overflow-y-auto"></div>
        </div>
    </aside>

    <main class="panel relative">
        <div class="absolute top-3 left-3 z-50 bg-black/85 p-3 border border-gray-800 rounded backdrop-blur-md">
            <p class="header-sub text-gray-400">BTC/USDT Spot</p>
            <p id="main-price" class="text-3xl font-black text-white glow-text">0.00</p>
            <p id="strike-diff" class="text-[10px] font-bold mt-1">-- vs strike</p>
        </div>
        <div id="chart-container"></div>
    </main>

    <aside class="flex flex-col gap-2">
        <div class="panel p-4 border-blue-500/40 bg-blue-900/10 shadow-[inset_0_0_20px_rgba(59,130,246,0.1)]">
            <h3 class="header-sub mb-4 text-center">Polymarket Midpoint</h3>
            <div class="bg-black/60 p-6 border border-gray-800 rounded-lg text-center shadow-xl">
                <p id="poly-val" class="text-6xl font-black text-white glow-text">--¢</p>
                <div class="w-full bg-gray-900 h-2 mt-5 rounded-full overflow-hidden">
                    <div id="poly-bar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
            <p id="token-status" class="text-[9px] text-center mt-3 text-yellow-500 font-bold tracking-widest uppercase">Initializing...</p>
        </div>
        <div class="panel flex-1 flex flex-col items-center justify-center bg-black/20">
            <span class="header-sub text-gray-500">Closing In</span>
            <div id="timer" class="text-7xl font-black text-white">00:00</div>
            <div id="signal-box" class="mt-6 px-5 py-2 rounded-full border border-gray-800 text-[11px] font-black text-gray-500 uppercase tracking-tighter">Scanning...</div>
        </div>
    </aside>

    <script>
        const TOKEN_ID = "67404634114493846562791118559100324093748944985408299978272941795392737044375";
        const STRIKE = 67600; 
        const PROXIES = [
            "https://api.allorigins.win/raw?url=",
            "https://groqproxy.popkosasha86.workers.dev/?url="
        ];

        let chart, candleSeries, lastPrice = 0;

        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#0b0e14' }, textColor: '#707a8a' },
                grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
                timeScale: { borderColor: '#1d2127', timeVisible: true }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false, wickUpColor: '#00ffad', wickDownColor: '#ff3b69'
            });
            candleSeries.createPriceLine({ price: STRIKE, color: '#ff3b69', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'STRIKE' });

            fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100")
                .then(r => r.json()).then(d => {
                    candleSeries.setData(d.map(x => ({
                        time: x[0]/1000, open: +x[1], high: +x[2], low: +x[3], close: +x[4]
                    })));
                    chart.timeScale().fitContent();
                });
        }

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade/btcusdt@depth5@100ms');
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.e === 'trade') {
                lastPrice = +d.p;
                document.getElementById('main-price').innerText = lastPrice.toLocaleString();
                const diff = lastPrice - STRIKE;
                const diffEl = document.getElementById('strike-diff');
                diffEl.innerText = `${diff > 0 ? '+' : ''}${diff.toFixed(2)} vs strike`;
                diffEl.className = `text-[10px] font-bold ${diff > 0 ? 'text-[#00ffad]' : 'text-[#ff3b69]'}`;
                
                const feed = document.getElementById('sales-feed');
                feed.insertAdjacentHTML('afterbegin', `<div class="trade-row ${!d.m ? 'text-[#00ffad]' : 'text-[#ff3b69]'}"><span>${new Date().toLocaleTimeString()}</span><span>${(+d.p).toFixed(1)}</span></div>`);
                if(feed.children.length > 20) feed.lastChild.remove();
            } else if (d.asks) {
                document.getElementById('asks').innerHTML = d.asks.map(x => `<div class="flex justify-between"><span>${(+x[0]).toFixed(1)}</span><span>${(+x[1]).toFixed(3)}</span></div>`).reverse().join('');
                document.getElementById('bids').innerHTML = d.bids.map(x => `<div class="flex justify-between"><span>${(+x[0]).toFixed(1)}</span><span>${(+x[1]).toFixed(3)}</span></div>`).join('');
                document.getElementById('spread').innerText = `Spread: ${(d.asks[0][0]-d.bids[0][0]).toFixed(2)}`;
            }
        };

        async function fetchPoly() {
            const target = `https://clob.polymarket.com/midpoint?token_id=${TOKEN_ID}`;
            
            for (let proxy of PROXIES) {
                try {
                    const res = await fetch(`${proxy}${encodeURIComponent(target)}&cb=${Date.now()}`);
                    if (!res.ok) continue;
                    
                    const data = await res.json();
                    if (data && data.midpoint) {
                        const m = parseFloat(data.midpoint);
                        document.getElementById('poly-val').innerText = (m * 100).toFixed(1) + '¢';
                        document.getElementById('poly-bar').style.width = (m * 100) + '%';
                        
                        const st = document.getElementById('token-status');
                        st.innerText = 'SYNC ACTIVE';
                        st.className = 'text-[9px] text-center mt-3 text-green-500 font-bold';
                        updateSignal(m);
                        return;
                    }
                } catch (e) { console.log("Proxy fail, trying next..."); }
            }
            document.getElementById('token-status').innerText = 'LINK RETRYING...';
        }

        function updateSignal(m) {
            const sig = document.getElementById('signal-box');
            const polyCents = m * 100;
            // Логика: если цена BTC выше страйка, а YES стоит дешевле 75 центов — явный EDGE
            if (lastPrice > STRIKE + 10 && polyCents < 75) {
                sig.innerText = 'BULLISH EDGE: BUY YES';
                sig.className = 'mt-6 px-5 py-2 rounded-full border border-green-500 bg-green-500/20 text-[11px] font-black text-green-400 animate-pulse';
            } else if (lastPrice < STRIKE - 10 && polyCents > 25) {
                sig.innerText = 'BEARISH EDGE: BUY NO';
                sig.className = 'mt-6 px-5 py-2 rounded-full border border-red-500 bg-red-500/20 text-[11px] font-black text-red-400 animate-pulse';
            } else {
                sig.innerText = 'MARKET STABLE';
                sig.className = 'mt-6 px-5 py-2 rounded-full border border-gray-800 text-[11px] font-black text-gray-500';
            }
        }

        let s = 445; 
        setInterval(() => {
            s--; if(s<0) s=900;
            const m = Math.floor(s/60); const sc = s%60;
            document.getElementById('timer').innerText = `${m}:${sc<10?'0':''}${sc}`;
        }, 1000);

        initChart();
        // Запускаем опрос с плавающим интервалом, чтобы не злить прокси
        (function loop() {
            setTimeout(() => { fetchPoly(); loop(); }, 4000 + Math.random() * 2000);
        })();
        fetchPoly();

        window.addEventListener('resize', () => {
            if(chart) chart.resize(document.getElementById('chart-container').offsetWidth, document.getElementById('chart-container').offsetHeight);
        });
    </script>
</body>
</html>
