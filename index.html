<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Polymarket Sniper | Fixed Version</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #05070a; --panel: #0b0e14; --border: #1d2127; }
        body { background: var(--bg); color: #e1e4e8; font-family: 'JetBrains Mono', monospace; font-size: 11px; margin: 0; overflow: hidden; }
        .grid-layout { display: grid; grid-template-columns: 280px 1fr 300px; height: 100vh; gap: 6px; padding: 6px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        .header-sub { color: #5d6773; font-size: 9px; text-transform: uppercase; font-weight: bold; }
        #chart-container { width: 100%; height: 100%; }
    </style>
</head>
<body class="grid-layout">

    <aside class="flex flex-col gap-2 overflow-hidden">
        <div class="panel p-3 h-1/2">
            <h3 class="header-sub mb-2 text-blue-400">📊 Order Book</h3>
            <div id="asks" class="text-[#ff3b69]"></div>
            <div id="spread" class="text-center py-1 border-y border-gray-800 my-1 text-gray-500">---</div>
            <div id="bids" class="text-[#00ffad]"></div>
        </div>
        <div class="panel flex-1">
            <div class="p-2 border-b border-gray-800 flex justify-between">
                <span class="header-sub text-white">Live Sales</span>
                <span id="ws-status" class="text-[8px] text-yellow-500 bg-yellow-500/10 px-1 rounded">IDLE</span>
            </div>
            <div id="sales-feed" class="flex-1 overflow-y-auto p-2"></div>
        </div>
    </aside>

    <main class="panel relative">
        <div class="absolute top-3 left-3 z-50 bg-black/80 p-2 border border-gray-800 rounded">
            <p class="header-sub">BTC/USDT Spot</p>
            <p id="main-price" class="text-xl font-bold">0.00</p>
            <p id="strike-diff" class="text-[10px] text-gray-500">-- vs strike</p>
        </div>
        <div id="chart-container"></div>
    </main>

    <aside class="flex flex-col gap-2">
        <div class="panel p-4 border-blue-500/30">
            <h3 class="header-sub mb-4 text-center">Polymarket</h3>
            <div class="bg-black/40 p-4 border border-gray-800 rounded text-center">
                <p id="poly-val" class="text-4xl font-black">--¢</p>
                <div class="w-full bg-gray-900 h-1.5 mt-3 rounded-full overflow-hidden">
                    <div id="poly-bar" class="bg-blue-500 h-full transition-all" style="width: 0%"></div>
                </div>
            </div>
            <p id="token-status" class="text-[8px] text-center mt-2 text-gray-500">CONNECTING...</p>
        </div>
        <div class="panel flex-1 flex flex-col items-center justify-center">
            <span class="header-sub">Time Remaining</span>
            <div id="timer" class="text-6xl font-black">08:00</div>
        </div>
    </aside>

    <script>
        const TOKEN_ID = "73386326250505661166199820758407085740901435999806488177463982633430474049621";
        const STRIKE = 68000;
        const PROXY = "https://api.allorigins.win/raw?url="; // Запасной прокси для теста

        let chart, candleSeries;

        function initChart() {
            const container = document.getElementById('chart-container');
            // Исправленный синтаксис для 4-й версии Lightweight Charts
            chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#0b0e14' }, textColor: '#707a8a' },
                grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
                timeScale: { borderColor: '#1d2127', timeVisible: true }
            });
            
            // НОВОЕ: правильный метод создания серии
            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false, wickUpColor: '#00ffad', wickDownColor: '#ff3b69'
            });

            fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100")
                .then(r => r.json()).then(d => {
                    candleSeries.setData(d.map(x => ({
                        time: x[0]/1000, open: +x[1], high: +x[2], low: +x[3], close: +x[4]
                    })));
                    chart.timeScale().fitContent();
                });
        }

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade/btcusdt@depth5@100ms');
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.e === 'trade') {
                document.getElementById('main-price').innerText = (+d.p).toLocaleString();
                document.getElementById('ws-status').innerText = 'WS LIVE';
                document.getElementById('ws-status').className = 'text-[8px] text-green-500 bg-green-500/10 px-1 rounded';
                
                const row = `<div>${new Date().toLocaleTimeString()} | ${(+d.p).toFixed(1)}</div>`;
                const feed = document.getElementById('sales-feed');
                feed.insertAdjacentHTML('afterbegin', row);
                if(feed.children.length > 15) feed.lastChild.remove();
            }
        };

        async function fetchPoly() {
            try {
                const target = `https://clob.polymarket.com/midpoint?token_id=${TOKEN_ID}`;
                const res = await fetch(PROXY + encodeURIComponent(target));
                const data = await res.json();
                if (data && data.midpoint) {
                    const m = parseFloat(data.midpoint);
                    document.getElementById('poly-val').innerText = (m * 100).toFixed(1) + '¢';
                    document.getElementById('poly-bar').style.width = (m * 100) + '%';
                    document.getElementById('token-status').innerText = 'SYNC OK';
                }
            } catch (e) {
                document.getElementById('token-status').innerText = 'POLY OFFLINE';
            }
        }

        initChart();
        setInterval(fetchPoly, 5000);
        fetchPoly();

        window.addEventListener('resize', () => {
            chart.resize(document.getElementById('chart-container').offsetWidth, document.getElementById('chart-container').offsetHeight);
        });
    </script>
</body>
</html>
