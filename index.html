<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL ALPHA V7 | RAW ENGINE</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020204; color: #ececec; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .panel { background: #09090b; border: 1px solid #1a1a1e; border-radius: 12px; }
        .glitch-text { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .input-dark { background: #121214; border: 1px solid #2a2a2e; color: #00ffad; padding: 2px 8px; border-radius: 4px; outline: none; }
    </style>
</head>
<body class="h-screen p-2 grid grid-cols-[260px_1fr_320px] gap-2">

    <div class="panel p-3 flex flex-col overflow-hidden">
        <div class="text-[10px] font-bold text-blue-500 mb-4 tracking-tighter uppercase">Binance Raw Feed</div>
        <div id="tape" class="text-[11px] space-y-1 overflow-y-auto flex-1 scrollbar-hide"></div>
    </div>

    <div class="flex flex-col gap-2">
        <div class="grid grid-cols-3 gap-2">
            <div class="panel p-4">
                <div class="text-[9px] text-gray-500 uppercase">Current BTC</div>
                <div id="price" class="text-3xl font-black text-white tabular-nums">0.00</div>
            </div>
            <div class="panel p-4">
                <div class="text-[9px] text-gray-500 uppercase">Target (Strike)</div>
                <input id="strike-manual" type="number" step="0.01" class="text-xl font-black bg-transparent text-red-500 w-full outline-none" placeholder="SET MANUALLY">
            </div>
            <div class="panel p-4">
                <div class="text-[9px] text-gray-500 uppercase">Difference</div>
                <div id="diff" class="text-xl font-black">---</div>
            </div>
        </div>
        
        <div class="panel flex-1 relative overflow-hidden" id="chart-box">
            <div id="chart" class="absolute inset-0"></div>
        </div>
    </div>

    <div class="panel p-4 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] font-bold text-gray-600">ENGINE V7.0</span>
            <div id="status-dot" class="h-2 w-2 rounded-full bg-red-500 animate-ping"></div>
        </div>

        <div id="decision" class="flex-1 flex flex-col justify-center items-center text-center">
            <div class="text-gray-700 font-bold uppercase italic glitch-text">Syncing System...</div>
        </div>

        <div class="mt-auto border-t border-gray-800 pt-4">
            <div class="text-[10px] text-gray-500 uppercase mb-1">Time to Expiry</div>
            <div id="timer" class="text-5xl font-black tracking-tighter italic text-blue-500">00:00</div>
        </div>
    </div>

    <script>
        let STRIKE = 0;
        let lastBTC = 0;
        const MARKET_ID = "btc-usd-up-down-2026-03-09-02-15"; // Проверь ID в ссылке!

        // CHART INIT
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#09090b' }, textColor: '#444' },
            grid: { vertLines: { color: '#121214' }, horzLines: { color: '#121214' } },
            timeScale: { timeVisible: true, borderVisible: false },
            rightPriceScale: { borderVisible: false, autoScale: true }
        });
        const series = chart.addCandlestickSeries({ upColor: '#00ffad', downColor: '#ff3b69', borderVisible: false });
        let strikeLine = null;

        // MANUAL STRIKE OVERRIDE
        document.getElementById('strike-manual').addEventListener('change', (e) => {
            STRIKE = parseFloat(e.target.value);
            updateStrikeLine();
        });

        function updateStrikeLine() {
            if (strikeLine) series.removePriceLine(strikeLine);
            strikeLine = series.createPriceLine({
                price: STRIKE, color: '#ff3b69', lineWidth: 2, lineStyle: 0, axisLabelVisible: true, title: 'TARGET'
            });
            document.getElementById('status-dot').classList.remove('bg-red-500');
            document.getElementById('status-dot').classList.add('bg-green-500');
        }

        // AUTO SYNC ENGINE
        async function forceSync() {
            try {
                const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://api.predict.fun/v1/markets/'+MARKET_ID)}&_=${Date.now()}`;
                const r = await fetch(proxy);
                const d = await r.json();
                const s = parseFloat(d.strike_price || d.line || d.price_to_beat);
                
                if (s > 10000 && !document.activeElement.id.includes('strike-manual')) {
                    STRIKE = s;
                    document.getElementById('strike-manual').value = STRIKE;
                    updateStrikeLine();
                }
            } catch(e) {}
        }

        // BINANCE CORE
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data);
            lastBTC = parseFloat(d.p);
            document.getElementById('price').innerText = lastBTC.toFixed(2);
            
            if (STRIKE > 0) {
                const delta = lastBTC - STRIKE;
                const diffEl = document.getElementById('diff');
                diffEl.innerText = (delta > 0 ? '+' : '') + delta.toFixed(2);
                diffEl.className = `text-xl font-black ${delta > 0 ? 'text-green-500' : 'text-red-500'}`;
                
                // DECISION LOGIC
                const decisionEl = document.getElementById('decision');
                if (delta > 40) {
                    decisionEl.innerHTML = `<div class="text-green-500 text-xs font-bold tracking-[0.3em] mb-2 uppercase">BUY UP SIGNAL</div><div class="text-5xl font-black leading-none">UP</div>`;
                } else if (delta < -40) {
                    decisionEl.innerHTML = `<div class="text-red-500 text-xs font-bold tracking-[0.3em] mb-2 uppercase">BUY DOWN SIGNAL</div><div class="text-5xl font-black leading-none">DOWN</div>`;
                } else {
                    decisionEl.innerHTML = `<div class="text-gray-700 font-bold uppercase">SCANNING...</div>`;
                }
            }

            series.update({ time: Math.floor(d.E / 60000) * 60, close: lastBTC });
            
            const tape = document.getElementById('tape');
            tape.insertAdjacentHTML('afterbegin', `<div class="flex justify-between border-b border-white/5 pb-1"><span class="text-gray-600">${new Date().toLocaleTimeString()}</span><span class="${lastBTC > STRIKE ? 'text-green-500' : 'text-red-500'}">${lastBTC.toFixed(1)}</span></div>`);
            if(tape.children.length > 40) tape.lastChild.remove();
        };

        // UI HELPERS
        setInterval(() => {
            const now = new Date();
            const m = now.getMinutes(); const s = now.getSeconds();
            const remM = 14 - (m % 15); const remS = 59 - s;
            document.getElementById('timer').innerText = `${remM}:${remS < 10 ? '0' : ''}${remS}`;
        }, 1000);

        async function loadHistory() {
            const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100');
            const data = await r.json();
            series.setData(data.map(d => ({ time: d[0]/1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]) })));
            chart.timeScale().fitContent();
        }

        loadHistory();
        setInterval(forceSync, 5000);
        forceSync();

        new ResizeObserver(() => {
            chart.applyOptions({ width: document.getElementById('chart-box').clientWidth, height: document.getElementById('chart-box').clientHeight });
        }).observe(document.getElementById('chart-box'));
    </script>
</body>
</html>
