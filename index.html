<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL V17.4 | AGGRESSIVE MODE</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #02040a; color: #cbd5e1; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .panel { background: #0b0e14; border: 1px solid #1e293b; border-radius: 8px; }
        .stat-card { border-left: 3px solid #334155; padding-left: 10px; }
        .signal-up { color: #10b981; text-shadow: 0 0 20px rgba(16,185,129,0.6); animation: flash 1s infinite; }
        .signal-down { color: #ef4444; text-shadow: 0 0 20px rgba(239,68,68,0.6); animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .dist-danger { color: #ff3b69; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="h-screen p-3 grid grid-cols-[300px_1fr_320px] gap-3">

    <div class="panel p-4 flex flex-col gap-4 overflow-y-auto">
        <div class="border-b border-slate-800 pb-2 flex justify-between items-center">
            <span class="text-[10px] font-bold text-red-500 uppercase tracking-widest italic">V17.4 AGGRESSIVE</span>
            <span class="text-[10px] text-yellow-400 font-bold underline">LIVE SIGNALS</span>
        </div>
        
        <div class="space-y-4">
            <div class="panel bg-slate-900/50 p-3 border-red-500/30">
                <div class="text-[9px] text-slate-500 uppercase font-black mb-1">Strike Distance</div>
                <div id="dist-val" class="text-2xl font-black tabular-nums text-red-400">0.00</div>
                <div id="dist-status" class="text-[8px] font-bold uppercase mt-1 text-slate-500 italic">WAITING...</div>
            </div>

            <div class="stat-card">
                <div class="text-[9px] text-slate-500 uppercase font-bold">RSI (14)</div>
                <div id="rsi-status" class="text-xs font-bold text-slate-400">--</div>
            </div>

            <div class="stat-card">
                <div class="text-[9px] text-slate-500 uppercase font-bold">ATR Volatility</div>
                <div id="atr-val" class="text-xs font-bold text-slate-400">0.00</div>
            </div>

            <div class="stat-card">
                <div class="text-[9px] text-slate-500 uppercase font-bold">Trend (EMA)</div>
                <div id="ema-status" class="text-xs font-bold text-slate-400">...</div>
            </div>
        </div>

        <div class="mt-auto panel bg-red-900/10 p-3 text-[9px] text-red-400/80 leading-tight" id="reasons">
            Aggressive mode active. Signal restriction removed.
        </div>
    </div>

    <div class="flex flex-col gap-3">
        <div class="grid grid-cols-4 gap-3 text-center">
            <div class="panel p-3">
                <div class="text-[8px] text-slate-500 font-bold uppercase">BTC Spot</div>
                <div id="price" class="text-xl font-black text-white tabular-nums">0.00</div>
            </div>
            <div class="panel p-3 border-r-4 border-red-600">
                <div class="text-[8px] text-slate-500 font-bold uppercase italic">Strike Price</div>
                <input id="strike-manual" type="number" class="w-full bg-transparent text-xl font-black text-red-500 outline-none text-center" value="0">
            </div>
            <div class="panel p-3">
                <div class="text-[8px] text-slate-500 font-bold uppercase">Power</div>
                <div id="conf-val" class="text-xl font-black text-blue-500">0%</div>
            </div>
            <div class="panel p-3">
                <div class="text-[8px] text-slate-500 font-bold uppercase">Cycle</div>
                <div id="timer" class="text-xl font-black text-slate-400 italic">00:00</div>
            </div>
        </div>
        <div class="panel flex-1 relative overflow-hidden" id="chart-box"><div id="chart" class="absolute inset-0"></div></div>
    </div>

    <div id="decision-panel" class="panel p-6 flex flex-col items-center justify-between text-center relative overflow-hidden">
        <div class="w-full text-left uppercase text-[10px] font-black text-red-900">Final Decision</div>
        
        <div id="main-signal" class="z-10">
            <div id="signal-text" class="text-slate-800 font-black text-8xl italic tracking-tighter transition-all duration-300">WAIT</div>
            <div id="signal-sub" class="text-[10px] text-slate-400 mt-4 uppercase font-bold tracking-widest">Scanning Market Impulse</div>
        </div>

        <div class="w-full space-y-4">
            <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase">
                <span>Confidence Meter</span>
                <span id="rsi-numeric">RSI: --</span>
            </div>
            <div class="h-3 bg-slate-900 rounded-full overflow-hidden border border-slate-800">
                <div id="conf-bar" class="h-full bg-gradient-to-r from-blue-600 to-indigo-400 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        let STRIKE = 0, lastBTC = 0, history = [], currentCandle = null, strikeLine = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function beep(f) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; g.gain.value = 0.08;
            o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
            o.stop(audioCtx.currentTime + 0.4);
        }

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0b0e14' }, textColor: '#64748b' },
            grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
            rightPriceScale: { borderVisible: false, autoScale: true },
            timeScale: { borderVisible: false }
        });
        const series = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false });

        async function init() {
            const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100');
            const data = await r.json();
            history = data.map(d => ({ time: d[0]/1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]) }));
            series.setData(history);
            currentCandle = history[history.length-1];
        }

        function getEMA(p) {
            const c = history.map(h => h.close);
            let k = 2/(p+1), e = c[0];
            for (let i=1; i<c.length; i++) e = c[i]*k + e*(1-k);
            return e;
        }

        function getRSI(p=14) {
            const c = history.map(h => h.close);
            if(c.length < p) return 50;
            let up=0, dn=0;
            for(let i=c.length-p; i<c.length; i++) {
                let diff = c[i] - c[i-1];
                if(diff > 0) up += diff; else dn -= diff;
            }
            return 100 - (100 / (1 + (up/dn || 1)));
        }

        function getATR(p=14) {
            const slice = history.slice(-p);
            let sum = 0; slice.forEach(c => sum += (c.high - c.low));
            return sum / p;
        }

        function update() {
            if (history.length < 30 || STRIKE === 0) return;
            const delta = lastBTC - STRIKE;
            const ema9 = getEMA(9), ema21 = getEMA(21);
            const rsi = getRSI();
            const atr = getATR();
            
            // UI Stats
            document.getElementById('dist-val').innerText = Math.abs(delta).toFixed(2);
            document.getElementById('dist-status').innerText = delta > 0 ? "ABOVE STRIKE" : "BELOW STRIKE";
            document.getElementById('rsi-status').innerText = rsi > 70 ? "OVERBOUGHT" : rsi < 30 ? "OVERSOLD" : "NEUTRAL";
            document.getElementById('rsi-status').className = rsi > 70 ? "text-xs font-bold text-red-500" : rsi < 30 ? "text-xs font-bold text-green-500" : "text-xs font-bold text-slate-400";
            document.getElementById('rsi-numeric').innerText = "RSI: " + rsi.toFixed(1);
            document.getElementById('atr-val').innerText = atr.toFixed(2);
            document.getElementById('ema-status').innerText = ema9 > ema21 ? "UP TREND" : "DOWN TREND";
            document.getElementById('ema-status').className = ema9 > ema21 ? "text-xs font-bold text-green-500" : "text-xs font-bold text-red-500";

            // AGGRESSIVE BRAIN
            let score = 10;
            if (ema9 > ema21 && delta < 0) score += 35; // Бычий тренд, цена под страйком
            if (ema9 < ema21 && delta > 0) score += 35; // Медвежий тренд, цена над страйком
            if (delta < 0 && rsi < 45) score += 20; // RSI в зоне покупки
            if (delta > 0 && rsi > 55) score += 20; // RSI в зоне продажи
            if (Math.abs(delta) > (atr * 0.5)) score += 15; // Дистанция больше половины шума

            const conf = Math.max(5, Math.min(score, 99));
            document.getElementById('conf-val').innerText = conf + "%";
            document.getElementById('conf-bar').style.width = conf + "%";

            // SIGNAL OUTPUT (No time limit)
            const sigText = document.getElementById('signal-text');
            const sigSub = document.getElementById('signal-sub');
            
            if (conf >= 50) {
                const side = delta > 0 ? 'DOWN' : 'UP';
                sigText.innerText = side;
                sigText.className = (side === 'UP' ? 'signal-up' : 'signal-down') + ' font-black text-8xl italic tracking-tighter';
                sigSub.innerText = (side === 'UP' ? 'Bullish Push Detected' : 'Bearish Pressure Detected');
                if (Math.random() > 0.95) beep(side === 'UP' ? 900 : 300); // Редкие бипы для фона
            } else {
                sigText.innerText = "WAIT";
                sigText.className = "text-slate-800 font-black text-8xl italic tracking-tighter";
                sigSub.innerText = "Scanning Market Impulse";
            }
        }

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = e => {
            const d = JSON.parse(e.data); lastBTC = parseFloat(d.p);
            document.getElementById('price').innerText = lastBTC.toLocaleString();
            const time = Math.floor(d.E/60000)*60;
            if(!currentCandle || time > currentCandle.time) {
                currentCandle = { time, open: lastBTC, high: lastBTC, low: lastBTC, close: lastBTC };
                history.push(currentCandle);
            } else {
                currentCandle.close = lastBTC; currentCandle.high = Math.max(currentCandle.high, lastBTC); currentCandle.low = Math.min(currentCandle.low, lastBTC);
            }
            series.update(currentCandle); update();
        };

        setInterval(() => {
            const now = new Date();
            const remM = 14 - (now.getMinutes() % 15);
            const remS = 59 - now.getSeconds();
            document.getElementById('timer').innerText = `${remM}:${remS < 10 ? '0' : ''}${remS}`;
        }, 1000);

        document.getElementById('strike-manual').addEventListener('input', (e) => {
            STRIKE = parseFloat(e.target.value);
            if (strikeLine) series.removePriceLine(strikeLine);
            strikeLine = series.createPriceLine({ price: STRIKE, color: '#ff004c', lineWidth: 2, lineStyle: 0, title: 'STRIKE' });
        });

        init();
        new ResizeObserver(() => chart.applyOptions({ width: document.getElementById('chart-box').clientWidth, height: document.getElementById('chart-box').clientHeight })).observe(document.getElementById('chart-box'));
    </script>
</body>
</html>
